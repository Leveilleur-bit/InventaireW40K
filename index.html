    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    // ══════════════════════════════════════════════════════════
    // ══════════════════════════════════════════════════════════

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open("wh40k-codex", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("appdata");
        req.onsuccess = e => resolve(e.target.result);
        req.onerror   = e => reject(e.target.error);
      });
    }
    async function loadApp() {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction("appdata", "readonly");
          const req = tx.objectStore("appdata").get("state");
          req.onsuccess = e => resolve(e.target.result || null);
          req.onerror   = () => resolve(null);
        });
      } catch { return null; }
    }
    async function saveApp(d) {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction("appdata", "readwrite");
          tx.objectStore("appdata").put(d, "state");
          tx.oncomplete = resolve;
          tx.onerror    = resolve;
        });
      } catch {}
    }

    // ══════════════════════════════════════════════════════════

    function PtsBadge({ unitId, faction, qty=1, pts, onSetPts }) {
      const f = FACTIONS[faction];
      const [editing, setEditing] = useState(false);
      const [editVal, setEditVal] = useState("");
      const inputRef = useRef(null);
      useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);
      const total = pts ? pts * qty : null;
      const confirm = () => {
        const n = parseInt(editVal);
        if (!isNaN(n) && n > 0) onSetPts(unitId, faction, n);
        setEditing(false); setEditVal("");
      };
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"3px" }}>
          {editing ? (
            <div style={{ display:"flex", gap:"4px", alignItems:"center" }}>
              <input ref={inputRef} type="number" value={editVal} onChange={e => setEditVal(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter") confirm(); if(e.key==="Escape") setEditing(false); }}
                placeholder={pts||"pts"}
                style={{ width:"60px", background:"#030303", border:`1px solid ${f.accent}`, color:f.accent, padding:"4px 6px", fontSize:"13px", fontFamily:"monospace", outline:"none", textAlign:"center" }} />
              <button onClick={confirm} style={{ background:`${f.accent}33`, border:`1px solid ${f.accent}`, color:f.accent, cursor:"pointer", padding:"3px 7px", fontSize:"12px" }}>✓</button>
              <button onClick={() => setEditing(false)} style={{ background:"none", border:"1px solid #131313", color:"#48402e", cursor:"pointer", padding:"3px 7px", fontSize:"12px" }}>✕</button>
            </div>
          ) : (
            <div onClick={() => { setEditVal(pts||""); setEditing(true); }} title="Toucher pour saisir les points"
              style={{ background:pts?`${f.accent}22`:"#131313", border:`1px solid ${pts?f.accent+"66":"#333"}`, padding:"4px 10px", display:"flex", alignItems:"center", minWidth:"70px", justifyContent:"center", cursor:"pointer" }}>
              {pts
                ? <span style={{ color:f.accent, fontWeight:"900", fontFamily:"monospace", fontSize:"15px" }}>{total} pts</span>
                : <span style={{ color:"#46402a", fontSize:"11px" }}>+ pts</span>
              }
            </div>
          )}
          {pts && !editing && <span style={{ color:"#2a4a2a", fontSize:"9px" }}>✎ manuel</span>}
        </div>
      );
    }

    function useTotalPts(entries, faction, ptsMap) {
      return entries.reduce((sum, e) => {
        const p = ptsMap[`${faction}:${e.unitId}`];
        return sum + (p ? p * e.qty : 0);
      }, 0);
    }

    // Wahapedia URL: spaces→hyphens, Title-Case each word, remove apostrophes/special chars
    // Format: wahapedia.ru/wh40k10ed/factions/[faction]/[Unit-Name]
    const WAHA_FACTIONS = {
      "SM": "space-marines",
      "TY": "tyranids",
      "IK": "imperial-knights",
    };

    function wahapediaUrl(unitName, faction) {
      const factionSlug = WAHA_FACTIONS[faction] || "space-marines";
      const slug = unitName
        .replace(/'/g, "")           // remove apostrophes
        .replace(/[^a-zA-Z0-9\s-]/g, "") // remove special chars
        .trim()
        .split(/\s+/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1)) // Title-Case
        .join("-");
      return `https://wahapedia.ru/wh40k10ed/factions/${factionSlug}/${slug}`;
    }

    function ModalAddUnit({ faction, inventory, onClose, onAdd, mode="list" }) {
      const f = FACTIONS[faction];
      const units = UNITS_DB[faction]||[];
      const [selected, setSelected] = useState(null);
      const [qty, setQty] = useState(1);
      const [paint, setPaint] = useState("unpainted");
      const [search, setSearch] = useState("");
      const [chapterFilter, setChapterFilter] = useState("Tous");
      const [photo, setPhoto] = useState(null);

      const chapters = faction==="SM" ? ["Tous",...new Set(units.map(u=>u.chapter).filter(Boolean))] : [];
      const available = mode==="list" ? units.filter(u => inventory.some(i => i.unitId===u.id && i.faction===faction)) : units;
      const filtered = available
        .filter(u => chapterFilter==="Tous" || !u.chapter || u.chapter===chapterFilter || u.chapter==="Générique")
        .filter(u => u.name.toLowerCase().includes(search.toLowerCase()));
      const grouped = filtered.reduce((acc,u) => { if(!acc[u.role]) acc[u.role]=[]; acc[u.role].push(u); return acc; }, {});

      return (
        <Overlay>
          <Sheet accent={f.accent}>
            <SheetHeader title={mode==="list"?"Ajouter à la liste":"Ajouter à l'inventaire"} onClose={onClose} accent={f.accent} />
            <Input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher…" style={{ marginBottom:"8px" }} />
            {faction==="SM" && (

    function InventoryItem({ item, faction, ptsMap, onSetPts, onDelete, onEditPhoto, onUpdatePaint, onUpdateQty, accent, viewMode, dragHandleProps }) {

        const idx = PAINT_KEYS.indexOf(item.paintStatus||"unpainted");
        const next = PAINT_KEYS[(idx+1) % PAINT_KEYS.length];
        onUpdatePaint(item.id, next);

      const borderColor = item.paintStatus==="painted" ? PAINT_STATUS.painted.color
        : item.paintStatus==="wip" ? PAINT_STATUS.wip.color
        : item.paintStatus==="primed" ? PAINT_STATUS.primed.color
        : accent;

              }
              {/* Paint dot top-right */}

              {/* Gradient overlay */}
              <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(10,8,6,0.85) 0%,transparent 55%)" }} />
              {/* Name at bottom of photo */}
              <div style={{ position:"absolute", bottom:"6px", left:"7px", right:"7px" }}>
                <div style={{ color:"#e8dfc0", fontSize:"10px", fontFamily:"'Cinzel',serif", lineHeight:1.2, textShadow:"0 1px 4px #000" }}>

              <button onClick={cycleStatus} title="Changer statut peinture"

                <div style={{ width:"5px", height:"5px", borderRadius:"50%", background:ps.color }} />

              </button>
              <button onClick={() => onDelete(item.id)} style={{ background:"none", border:"none", color:"#181410", cursor:"pointer", padding:"2px" }}><Ic.Trash /></button>

      // ── LIST CARD (default) ────────────────────────────────
      return (
        <div className="hcard" style={{ background:"linear-gradient(180deg,#181512 0%,#121008 100%)", border:"1px solid #222018", borderLeft:`3px solid ${borderColor}`, marginBottom:"5px", display:"flex", alignItems:"stretch", transition:"border-color 0.3s" }}>

          <div onClick={() => onEditPhoto(item)} style={{ width:"52px", flexShrink:0, cursor:"pointer", borderRight:"1px solid #0c0c0c", overflow:"hidden", position:"relative" }}>

              <>

          {/* Content */}

              <button onClick={() => onDelete(item.id)} style={{ background:"none", border:"none", color:"#181410", cursor:"pointer", padding:"2px" }}><Ic.Trash /></button>
            </div>
          </div>
        </div>
      );
    }

    function ViewInventory({ inventory, ptsMap, onSetPts, onAdd, onDelete, onUpdatePhoto, onUpdatePaint, onUpdateQty, onReorder }) {
      const [showModal, setShowModal] = useState(false);
      const [editPhotoItem, setEditPhotoItem] = useState(null);
      const [faction, setFaction] = useState("IK");
      const [viewMode, setViewMode] = useState("list"); // "list" | "grid"
      const [collapsedRoles, setCollapsedRoles] = useState({});
      const dragState = useRef(null);
      const [draggingId, setDraggingId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      const f = FACTIONS[faction];

      const rawItems = inventory
        .filter(i=>i.faction===faction)
        .map(i => ({ ...i, unit:UNITS_DB[i.faction]?.find(u=>u.id===i.unitId) }))
        .filter(i=>i.unit);

      // Group by role, respecting custom order (inventory order within each role)
      const grouped = {};
      ROLE_ORDER.forEach(r => { grouped[r] = []; });
      rawItems.forEach(item => {
        const role = item.unit.role;
        if (!grouped[role]) grouped[role] = [];
        grouped[role].push(item);
      });
      const usedRoles = ROLE_ORDER.filter(r => grouped[r]?.length > 0);

      const toggleRole = (role) => setCollapsedRoles(prev => ({ ...prev, [role]: !prev[role] }));

      // Drag-and-drop handlers
      const onDragStart = (e, item, role) => {
        dragState.current = { id: item.id, role, startY: e.touches?.[0]?.clientY ?? e.clientY };
        setDraggingId(item.id);
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", item.id); }
      };
      const onDragOver = (e, item) => {
        e.preventDefault();
        if (item.id !== draggingId) setDragOverId(item.id);
      };
      const onDrop = (e, targetItem) => {
        e.preventDefault();
        if (!dragState.current || dragState.current.id === targetItem.id) return;
        onReorder(dragState.current.id, targetItem.id, faction);
        setDraggingId(null); setDragOverId(null); dragState.current = null;
      };
      const onDragEnd = () => { setDraggingId(null); setDragOverId(null); dragState.current = null; };

      // Touch drag
      const onTouchStart = (e, item, role) => {
        dragState.current = { id: item.id, role, startY: e.touches[0].clientY };
        setDraggingId(item.id);
      };
      const onTouchMove = (e) => {
        if (!dragState.current) return;
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const card = el?.closest("[data-itemid]");
        if (card) setDragOverId(card.dataset.itemid);
      };
      const onTouchEnd = () => {
        if (!dragState.current || !dragOverId) { setDraggingId(null); setDragOverId(null); dragState.current = null; return; }
        onReorder(dragState.current.id, dragOverId, faction);
        setDraggingId(null); setDragOverId(null); dragState.current = null;
      };

      return (
        <div style={pageStyle}>
          <div style={{ background:"#030202", borderBottom:"1px solid #0f0f0f", padding:"18px 16px 14px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", right:"14px", top:"50%", transform:"translateY(-50%)", fontSize:"72px", color:"#0b0a09", lineHeight:1, pointerEvents:"none", fontFamily:"serif" }}>✠</div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ color:"#b8922a", fontSize:"8px", letterSpacing:"5px", fontFamily:"'Cinzel',serif", opacity:0.6, marginBottom:"4px" }}>REGISTRE DES RELIQUES</div>
                <div style={{ color:"#e8dfc0", fontSize:"18px", fontFamily:"'Cinzel Decorative','Cinzel',serif", letterSpacing:"3px", fontWeight:"700", textShadow:"0 0 20px #b8922a22" }}>INVENTAIRE</div>
                <div style={{ color:"#252012", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Cinzel',serif", marginTop:"3px" }}>{inventory.length} RÉFÉRENCES</div>
              </div>
              <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                <button onClick={() => setViewMode(v => v==="list"?"grid":"list")}
                  title={viewMode==="list"?"Vue grille":"Vue liste"}
                  style={{ background:"none", border:"1px solid #1c1c1c", color: viewMode==="grid"?"#b8922a":"#2a2218", cursor:"pointer", padding:"7px 9px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {viewMode==="list"
                    ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  }
                </button>
                <IconBtn onClick={() => setShowModal(true)}><Ic.Plus /></IconBtn>
              </div>
            </div>
          </div>
          <div style={{ display:"flex", background:"#020202", borderBottom:"1px solid #0f0f0f" }}>
            {Object.entries(FACTIONS).map(([k,v]) => {
              const fItems = inventory.filter(i=>i.faction===k);
              const painted = fItems.filter(i=>i.paintStatus==="painted").length;
              const total   = fItems.length;
              const pct     = total ? Math.round(painted/total*100) : 0;
              return (
                <button key={k} onClick={() => setFaction(k)} style={{ flex:1, background:"none", border:"none", borderBottom:faction===k?`2px solid ${v.accent}`:"2px solid transparent", color:faction===k?v.accent:"#181410", padding:"10px 0 8px", cursor:"pointer", fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"2px", textShadow:faction===k?`0 0 10px ${v.accent}66`:"none" }}>
                  <div style={{ fontSize:"16px", marginBottom:"3px" }}>{v.icon}</div>
                  {v.short}
                  {total>0 && (
                    <div style={{ margin:"5px 8px 0", height:"2px", background:"#0f0f0f", position:"relative" }}>
                      <div style={{ width:`${pct}%`, height:"100%", background: pct===100 ? "#2a7a2a" : v.accent, transition:"width 0.4s", opacity: faction===k?1:0.4 }} />
                    </div>
                  )}
                  {total>0 && (
                    <div style={{ fontSize:"7px", color: faction===k?(pct===100?"#2a7a2a":v.accent):"#252015", marginTop:"3px", letterSpacing:"1px" }}>
                      {painted}/{total}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"12px 16px" }} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
            {rawItems.length===0 && <EmptyState icon={f.icon} title="Aucune figurine" sub={`Ajoutez des ${f.label}`} />}
            {usedRoles.map(role => (
              <div key={role} style={{ marginBottom:"16px" }}>
                {/* Role header */}
                <button onClick={() => toggleRole(role)} style={{ width:"100%", background:"none", border:"none", display:"flex", alignItems:"center", gap:"10px", marginBottom:"8px", cursor:"pointer", padding:"4px 0" }}>
                  <div style={{ width:"2px", height:"12px", background:f.accent, opacity:0.6, flexShrink:0 }} />
                  <span style={{ color:"#6a5a4a", fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"4px", flex:1, textAlign:"left" }}>{role.toUpperCase()}</span>
                  <span style={{ color:"#3a3020", fontSize:"10px" }}>{grouped[role].length} — </span>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3a3020" strokeWidth="2.5"><polyline points={collapsedRoles[role]?"6 9 12 15 18 9":"18 15 12 9 6 15"}/></svg>
                </button>
                {!collapsedRoles[role] && (
                  viewMode==="grid" ? (
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px", marginBottom:"4px" }}>
                      {grouped[role].map(item => (
                        <InventoryItem key={item.id}
                          item={item} faction={faction} ptsMap={ptsMap} onSetPts={onSetPts}
                          onDelete={onDelete} onEditPhoto={setEditPhotoItem}
                          onUpdatePaint={onUpdatePaint} onUpdateQty={onUpdateQty}
                          accent={f.accent} viewMode="grid"
                          dragHandleProps={{}}
                        />
                      ))}
                    </div>
                  ) : (
                    grouped[role].map(item => (
                      <div key={item.id} data-itemid={item.id}
                        style={{ opacity: draggingId===item.id ? 0.4 : 1, outline: dragOverId===item.id ? `1px solid ${f.accent}88` : "none", transition:"opacity 0.15s" }}
                        onDragOver={e => onDragOver(e, item)}
                        onDrop={e => onDrop(e, item)}
                        onTouchStart={e => onTouchStart(e, item, role)}
                      >
                        <InventoryItem
                          item={item} faction={faction} ptsMap={ptsMap} onSetPts={onSetPts}
                          onDelete={onDelete} onEditPhoto={setEditPhotoItem}
                          onUpdatePaint={onUpdatePaint} onUpdateQty={onUpdateQty}
                          accent={f.accent} viewMode="list"
                          dragHandleProps={{
                            draggable: true,
                            onDragStart: e => onDragStart(e, item, role),
                            onDragEnd,
                          }}
                        />
                      </div>
                    ))
                  )
                )}
              </div>
            ))}
          </div>
          {showModal && <ModalAddUnit faction={faction} inventory={inventory} mode="inventory" onClose={() => setShowModal(false)} onAdd={onAdd} />}
          {editPhotoItem && <ModalEditPhoto item={editPhotoItem} faction={faction} onClose={() => setEditPhotoItem(null)} onSave={photo => onUpdatePhoto(editPhotoItem.id, photo)} />}
        </div>
      );
    }


    // ══════════════════════════════════════════════════════════
    // VIEW: Stats
    // ══════════════════════════════════════════════════════════

    function StatBar({ pct, color, height=4, bg="#0a0906" }) {
      return (
        <div style={{ background:bg, height, position:"relative", flex:1 }}>
          <div style={{ width:`${Math.min(100,pct)}%`, height:"100%", background:color, transition:"width 0.6s ease" }} />
        </div>
      );
    }

    function ViewStats({ inventory, lists, ptsMap }) {
      const totalModels   = inventory.reduce((s,i) => s+i.qty, 0);
      const totalUnique   = inventory.length;
      const totalPainted  = inventory.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);
      const totalPrimed   = inventory.filter(i=>i.paintStatus==="primed").reduce((s,i)=>s+i.qty,0);
      const totalWip      = inventory.filter(i=>i.paintStatus==="wip").reduce((s,i)=>s+i.qty,0);
      const totalUnpainted= inventory.filter(i=>i.paintStatus==="unpainted"||!i.paintStatus).reduce((s,i)=>s+i.qty,0);
      const paintPct      = totalModels ? Math.round(totalPainted/totalModels*100) : 0;

      // Points investis par faction
      const factionStats = Object.entries(FACTIONS).map(([k,f]) => {
        const items = inventory.filter(i=>i.faction===k);
        const models = items.reduce((s,i)=>s+i.qty,0);
        const painted = items.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);
        const pts = items.reduce((s,i)=>s+(ptsMap[`${k}:${i.unitId}`]||0)*i.qty,0);
        // Répartition par rôle
        const byRole = {};
        items.forEach(i => {
          const unit = UNITS_DB[k]?.find(u=>u.id===i.unitId);
          if (!unit) return;
          byRole[unit.role] = (byRole[unit.role]||0) + i.qty;
        });
        return { key:k, f, models, painted, pts, byRole, uniqueUnits:items.length };
      }).filter(s=>s.models>0);

      // Unités les plus présentes dans les listes
      const unitUsage = {};
      lists.forEach(list => {
        (list.entries||[]).forEach(e => {
          const key = `${list.faction}:${e.unitId}`;
          unitUsage[key] = (unitUsage[key]||{ count:0, faction:list.faction, unitId:e.unitId });
          unitUsage[key].count += 1;
        });
      });
      const topUnits = Object.values(unitUsage)
        .sort((a,b)=>b.count-a.count)
        .slice(0,5)
        .map(u => ({ ...u, unit: UNITS_DB[u.faction]?.find(un=>un.id===u.unitId), f: FACTIONS[u.faction] }))
        .filter(u=>u.unit);

      const totalPts = Object.entries(ptsMap).reduce((s,[k,v])=>{
        const [faction,unitId] = k.split(":");
        const inv = inventory.filter(i=>i.faction===faction&&i.unitId===unitId);
        return s + inv.reduce((ss,i)=>ss+v*i.qty,0);
      },0);

      const accent = "#b8922a";

      return (
        <div style={pageStyle}>
          {/* Header */}
          <div style={{ background:"#030202", borderBottom:"1px solid #0f0f0f", padding:"18px 16px 14px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", right:"14px", top:"50%", transform:"translateY(-50%)", fontSize:"72px", color:"#0b0a09", lineHeight:1, pointerEvents:"none", fontFamily:"serif" }}>✠</div>
            <div style={{ color:"#b8922a", fontSize:"8px", letterSpacing:"5px", fontFamily:"'Cinzel',serif", opacity:0.6, marginBottom:"4px" }}>ÉTAT DES FORCES</div>
            <div style={{ color:"#e8dfc0", fontSize:"18px", fontFamily:"'Cinzel Decorative','Cinzel',serif", letterSpacing:"3px", fontWeight:"700" }}>STATISTIQUES</div>
          </div>

          <div style={{ flex:1, overflowY:"auto", padding:"16px" }}>

            {/* ── GLOBAL ─────────────────────── */}
            <div style={{ marginBottom:"20px" }}>
              <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"4px", fontFamily:"'Cinzel',serif", marginBottom:"10px" }}>COLLECTION GLOBALE</div>

              {/* Big paint ring simulation via stacked bars */}
              <div style={{ background:"linear-gradient(180deg,#131110 0%,#0d0b0a 100%)", border:"1px solid #1c1a18", borderTop:`2px solid ${accent}`, padding:"16px", marginBottom:"8px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:"12px" }}>
                  <div>
                    <div style={{ color:"#e8dfc0", fontSize:"32px", fontFamily:"'Cinzel',serif", fontWeight:"900", lineHeight:1 }}>{paintPct}<span style={{ fontSize:"16px", color:accent }}>%</span></div>
                    <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"2px", marginTop:"2px" }}>PEINT</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ color:"#e8dfc0", fontSize:"20px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{totalModels}</div>
                    <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"2px" }}>FIGURINES</div>
                  </div>
                </div>
                {/* Stacked bar */}
                <div style={{ display:"flex", height:"6px", gap:"1px", marginBottom:"10px" }}>
                  {totalPainted>0  && <div style={{ flex:totalPainted,  background:PAINT_STATUS.painted.color }} />}
                  {totalWip>0      && <div style={{ flex:totalWip,      background:PAINT_STATUS.wip.color }} />}
                  {totalPrimed>0   && <div style={{ flex:totalPrimed,   background:PAINT_STATUS.primed.color }} />}
                  {totalUnpainted>0&& <div style={{ flex:totalUnpainted,background:"#1c1a16" }} />}
                </div>
                {/* Legend */}
                <div style={{ display:"flex", gap:"12px", flexWrap:"wrap" }}>
                  {[
                    {key:"painted",   label:"Peint",    val:totalPainted},
                    {key:"wip",       label:"En cours", val:totalWip},
                    {key:"primed",    label:"Apprêté",  val:totalPrimed},
                    {key:"unpainted", label:"Nu",       val:totalUnpainted},
                  ].map(s => s.val>0 && (
                    <div key={s.key} style={{ display:"flex", alignItems:"center", gap:"5px" }}>
                      <div style={{ width:"6px", height:"6px", borderRadius:"50%", background:PAINT_STATUS[s.key].color }} />
                      <span style={{ color:"#4a3c28", fontSize:"9px" }}>{s.label} <span style={{ color:"#8a7050" }}>{s.val}</span></span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Summary chips */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"6px" }}>
                {[
                  { label:"RÉFÉRENCES", val:totalUnique },
                  { label:"LISTES", val:lists.length },
                  { label:"PTS TOTAL", val:totalPts||"—" },
                ].map(c => (
                  <div key={c.label} style={{ background:"#0d0b0a", border:"1px solid #1a1816", padding:"10px 8px", textAlign:"center" }}>
                    <div style={{ color:"#e8dfc0", fontSize:"18px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{c.val}</div>
                    <div style={{ color:"#2a2215", fontSize:"7px", letterSpacing:"2px", marginTop:"3px" }}>{c.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── PAR FACTION ────────────────── */}
            {factionStats.length>0 && (
              <div style={{ marginBottom:"20px" }}>
                <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"4px", fontFamily:"'Cinzel',serif", marginBottom:"10px" }}>PAR FACTION</div>
                {factionStats.map(({ key, f, models, painted, pts, byRole, uniqueUnits }) => {
                  const pct = models ? Math.round(painted/models*100) : 0;
                  const topRoles = Object.entries(byRole).sort((a,b)=>b[1]-a[1]).slice(0,4);
                  return (
                    <div key={key} style={{ background:"linear-gradient(180deg,#131110 0%,#0d0b0a 100%)", border:"1px solid #1c1a18", borderLeft:`3px solid ${f.accent}`, padding:"12px 14px", marginBottom:"8px" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"10px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                          <span style={{ fontSize:"20px" }}>{f.icon}</span>
                          <div>
                            <div style={{ color:"#e8dfc0", fontSize:"12px", fontFamily:"'Cinzel',serif", letterSpacing:"1px" }}>{f.label}</div>
                            <div style={{ color:"#3a3020", fontSize:"9px", marginTop:"1px" }}>{uniqueUnits} unités · {models} figurines</div>
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ color: pct===100?"#2a7a2a":f.accent, fontSize:"20px", fontFamily:"'Cinzel',serif", fontWeight:"900" }}>{pct}%</div>
                          {pts>0 && <div style={{ color:"#3a3020", fontSize:"9px" }}>{pts} pts</div>}
                        </div>
                      </div>
                      {/* Paint bar */}
                      <div style={{ display:"flex", height:"3px", marginBottom:"10px", gap:"1px" }}>
                        {painted>0   && <div style={{ flex:painted,         background:PAINT_STATUS.painted.color }} />}
                        {(models-painted)>0 && <div style={{ flex:models-painted, background:"#1c1a16" }} />}
                      </div>
                      {/* Role breakdown */}
                      {topRoles.length>0 && (
                        <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                          {topRoles.map(([role,cnt]) => (
                            <div key={role} style={{ background:"#080604", border:`1px solid ${f.accent}22`, padding:"2px 8px", display:"flex", gap:"5px", alignItems:"center" }}>
                              <span style={{ color:f.accent, fontSize:"11px", fontWeight:"700" }}>{cnt}</span>
                              <span style={{ color:"#3a3020", fontSize:"8px", fontFamily:"'Cinzel',serif", letterSpacing:"1px" }}>{role}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── TOP UNITÉS EN LISTE ─────────── */}
            {topUnits.length>0 && (
              <div style={{ marginBottom:"20px" }}>
                <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"4px", fontFamily:"'Cinzel',serif", marginBottom:"10px" }}>FAVORIS EN LISTE</div>
                {topUnits.map((u,i) => (
                  <div key={i} style={{ background:"#0d0b0a", border:"1px solid #1a1816", borderLeft:`2px solid ${u.f.accent}44`, padding:"8px 12px", marginBottom:"5px", display:"flex", alignItems:"center", gap:"10px" }}>
                    <span style={{ color:"#2a2215", fontSize:"11px", fontFamily:"'Cinzel',serif", width:"16px", textAlign:"center" }}>{i+1}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ color:"#c8b890", fontSize:"12px", fontFamily:"'Cinzel',serif" }}>{u.unit.name}</div>
                      <div style={{ color:"#3a3020", fontSize:"9px", marginTop:"1px" }}>{u.f.label} · {u.unit.role}</div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                      <div style={{ background:`${u.f.accent}22`, border:`1px solid ${u.f.accent}44`, padding:"2px 8px" }}>
                        <span style={{ color:u.f.accent, fontSize:"11px", fontFamily:"'Cinzel',serif" }}>{u.count}×</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {inventory.length===0 && (
              <div style={{ textAlign:"center", padding:"48px 0", color:"#252015" }}>
                <div style={{ fontSize:"40px", marginBottom:"12px", opacity:0.3 }}>✠</div>
                <div style={{ fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"3px" }}>AUCUNE DONNÉE</div>
                <div style={{ fontSize:"10px", marginTop:"6px", fontStyle:"italic" }}>Ajoutez des figurines à votre inventaire</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // VIEW: Codex (paramètres + données)

      const totalModels = inventory.reduce((s,i)=>s+i.qty,0);
      const totalWithPhoto = inventory.filter(i=>i.photo).length;

      return (
        <div style={pageStyle}>

          <div style={{ background:"#030202", borderBottom:"1px solid #0f0f0f", padding:"18px 16px 14px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", right:"14px", top:"50%", transform:"translateY(-50%)", fontSize:"72px", color:"#0b0a09", lineHeight:1, pointerEvents:"none", fontFamily:"serif" }}>✠</div>
            <div style={{ color:"#b8922a", fontSize:"8px", letterSpacing:"5px", fontFamily:"'Cinzel',serif", opacity:0.6, marginBottom:"4px" }}>ADMINISTRATION</div>

          <div style={{ flex:1, overflowY:"auto", padding:"16px" }}>

            {/* ── SAUVEGARDE ───────────────── */}
            <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"4px", fontFamily:"'Cinzel',serif", marginBottom:"10px" }}>SAUVEGARDE DES DONNÉES</div>

            <div style={{ background:"linear-gradient(180deg,#131110 0%,#0d0b0a 100%)", border:"1px solid #1c1a18", borderTop:"2px solid #b8922a", padding:"16px", marginBottom:"8px" }}>
              <div style={{ color:"#6a5a3a", fontSize:"11px", fontFamily:"'Crimson Pro','Crimson Text',serif", fontStyle:"italic", lineHeight:1.6, marginBottom:"16px" }}>
                Tes données sont stockées localement sur cet appareil. Exporte régulièrement une sauvegarde pour ne rien perdre si tu changes de navigateur ou d'appareil.
              </div>

              {/* Summary chips */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"6px", marginBottom:"16px" }}>

                  { val: lists.length,     label:"LISTES"     },
                  { val: totalModels,      label:"FIGURINES"  },
                ].map(c => (
                  <div key={c.label} style={{ background:"#080604", border:"1px solid #1a1714", padding:"8px", textAlign:"center" }}>
                    <div style={{ color:"#b8922a", fontSize:"16px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{c.val}</div>
                    <div style={{ color:"#252015", fontSize:"7px", letterSpacing:"2px", marginTop:"2px" }}>{c.label}</div>
                  </div>
                ))}
              </div>

              {/* Export button */}
              <button onClick={onExport}
                style={{ width:"100%", padding:"14px", background:"linear-gradient(180deg,#1a1200 0%,#120d00 100%)", border:"1px solid #b8922a55", borderTop:"2px solid #b8922a", color:"#b8922a", fontFamily:"'Cinzel',serif", fontSize:"12px", letterSpacing:"3px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:"10px", marginBottom:"8px" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                EXPORTER LA SAUVEGARDE
              </button>

              {/* Import button */}
              <input ref={importRef} type="file" accept=".json" style={{ display:"none" }}
                onChange={e => { if(e.target.files[0]) { onImport(e.target.files[0]); e.target.value=""; } }} />
              <button onClick={() => importRef.current?.click()}
                style={{ width:"100%", padding:"14px", background:"#080604", border:"1px solid #252015", color:"#4a4028", fontFamily:"'Cinzel',serif", fontSize:"12px", letterSpacing:"3px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:"10px" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                IMPORTER UNE SAUVEGARDE
              </button>
            </div>

            {/* ── NOTE ─────────────────────── */}
            <div style={{ background:"#080604", border:"1px solid #141210", borderLeft:"2px solid #35281a", padding:"12px 14px", marginTop:"8px" }}>
              <div style={{ color:"#2a2215", fontSize:"9px", fontFamily:"'Cinzel',serif", letterSpacing:"2px", marginBottom:"6px" }}>NOTE</div>
              <div style={{ color:"#3a3020", fontSize:"10px", fontFamily:"'Crimson Pro','Crimson Text',serif", fontStyle:"italic", lineHeight:1.7 }}>
                Les photos sont incluses dans la sauvegarde (encodées en base64). Le fichier peut donc être volumineux si tu as beaucoup de photos.
                <br/><br/>
                Pour transférer vers un autre appareil, exporte le fichier JSON, transfère-le, puis importe-le depuis l'onglet Codex.
              </div>
            </div>

          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // ROOT APP
    // ══════════════════════════════════════════════════════════

    function SplashOverlay({ inventory, lists, ptsMap, onDone }) {
      const [phase, setPhase] = useState("in"); // "in" | "hold" | "out"
      const totalModels  = inventory.reduce((s,i)=>s+i.qty,0);
      const painted      = inventory.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);
      const paintPct     = totalModels ? Math.round(painted/totalModels*100) : 0;
      const totalPts     = Object.entries(ptsMap).reduce((s,[k,v])=>{
        const [faction,unitId] = k.split(":");
        return s + inventory.filter(i=>i.faction===faction&&i.unitId===unitId).reduce((ss,i)=>ss+v*i.qty,0);
      },0);

      useEffect(() => {
        const t1 = setTimeout(() => setPhase("out"), 2600);
        const t2 = setTimeout(() => onDone(), 3200);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      const factionSummary = Object.entries(FACTIONS).map(([k,f]) => {
        const items = inventory.filter(i=>i.faction===k);
        const models = items.reduce((s,i)=>s+i.qty,0);
        const p = items.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);
        return { key:k, f, models, painted:p };
      }).filter(s=>s.models>0);

      return (
        <div onClick={onDone} style={{
          position:"fixed", inset:0, zIndex:9999, background:"#020202",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          fontFamily:"'Cinzel',serif", cursor:"pointer",
          opacity: phase==="out" ? 0 : 1,
          transition: phase==="out" ? "opacity 0.6s ease" : "none",
          maxWidth:"430px", margin:"0 auto",
        }}>
          {/* BG cross watermark */}
          <div style={{ position:"absolute", fontSize:"300px", color:"#050403", lineHeight:1, fontFamily:"serif", pointerEvents:"none", animation:"breathe 4s ease-in-out infinite" }}>✠</div>
          <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at center, transparent 20%, #020202 80%)", pointerEvents:"none" }} />

          <div style={{ position:"relative", width:"100%", maxWidth:"320px", padding:"0 24px", animation:"splashIn 0.5s ease both" }}>
            {/* Title */}
            <div style={{ textAlign:"center", marginBottom:"32px" }}>
              <div style={{ fontSize:"52px", color:"#b8922a", textShadow:"0 0 60px #b8922a55", lineHeight:1, marginBottom:"14px", animation:"crossGrow 0.5s cubic-bezier(0.34,1.56,0.64,1) both" }}>✠</div>
              <div style={{ color:"#e8dfc0", fontSize:"19px", letterSpacing:"7px", fontFamily:"'Cinzel Decorative',serif", fontWeight:"900", textShadow:"0 0 30px #b8922a33" }}>BLACK TEMPLARS</div>
              <div style={{ color:"#252015", fontSize:"8px", letterSpacing:"4px", marginTop:"5px" }}>CODEX ASTARTES</div>
            </div>

            {inventory.length > 0 && (<>
              {/* Divider */}
              <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"20px" }}>
                <div style={{ flex:1, height:"1px", background:"linear-gradient(90deg,transparent,#2a2215)" }} />
                <div style={{ color:"#2a2215", fontSize:"8px", letterSpacing:"4px" }}>ÉTAT DE LA FORCE</div>
                <div style={{ flex:1, height:"1px", background:"linear-gradient(90deg,#2a2215,transparent)" }} />
              </div>

              {/* Big stats row */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"8px", marginBottom:"20px", animation:"statSlide 0.5s 0.2s ease both" }}>
                {[
                  { val: totalModels, label:"FIGURINES" },
                  { val: `${paintPct}%`, label:"PEINT" },
                  { val: lists.length, label:"LISTES" },
                ].map(s => (
                  <div key={s.label} style={{ background:"#0a0806", border:"1px solid #1a1714", padding:"12px 8px", textAlign:"center" }}>
                    <div style={{ color:"#b8922a", fontSize:"22px", fontWeight:"900", lineHeight:1 }}>{s.val}</div>
                    <div style={{ color:"#252015", fontSize:"7px", letterSpacing:"2px", marginTop:"4px" }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Paint bar */}
              <div style={{ marginBottom:"20px", animation:"statSlide 0.5s 0.35s ease both" }}>
                <div style={{ display:"flex", height:"3px", gap:"1px", marginBottom:"6px" }}>
                  {["painted","wip","primed","unpainted"].map(status => {
                    const cnt = inventory.filter(i=>(i.paintStatus||"unpainted")===status).reduce((s,i)=>s+i.qty,0);
                    return cnt>0 ? <div key={status} style={{ flex:cnt, background:PAINT_STATUS[status].color, transition:"flex 0.8s" }} /> : null;
                  })}
                </div>
              </div>

              {/* Faction breakdown */}
              {factionSummary.length>0 && (
                <div style={{ display:"flex", flexDirection:"column", gap:"6px", animation:"statSlide 0.5s 0.5s ease both" }}>
                  {factionSummary.map(({ key, f, models, painted }) => {
                    const pct = models ? Math.round(painted/models*100) : 0;
                    return (
                      <div key={key} style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                        <span style={{ fontSize:"14px", width:"20px", textAlign:"center" }}>{f.icon}</span>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex", height:"2px", background:"#0f0f0f", marginBottom:"3px" }}>
                            <div style={{ width:`${pct}%`, background: pct===100?"#2a7a2a":f.accent, transition:"width 1s 0.5s" }} />
                          </div>
                        </div>
                        <span style={{ color:"#2a2215", fontSize:"8px", width:"28px", textAlign:"right" }}>{models}fig</span>
                        <span style={{ color: pct===100?"#2a7a2a":f.accent, fontSize:"9px", fontWeight:"700", width:"32px", textAlign:"right" }}>{pct}%</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </>)}

            {/* Tap hint */}
            <div style={{ textAlign:"center", marginTop:"28px", color:"#1a1610", fontSize:"8px", letterSpacing:"3px", animation:"pulse 2s 1s infinite" }}>
              TOUCHER POUR ENTRER
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [appState, setAppState] = useState({ inventory:[], lists:[], ptsMap:{} });
      const [loaded, setLoaded] = useState(false);
      const [splashDone, setSplashDone] = useState(false);
      const [activeView, setActiveView] = useState("lists");
      const [activeListId, setActiveListId] = useState(null);
      const [lastSaved, setLastSaved] = useState(null); // timestamp
      const [saveAnim, setSaveAnim] = useState(false);   // flash animation

      useEffect(() => {
        loadApp().then(saved => {
          if (saved) setAppState({ inventory:[], lists:[], ptsMap:{}, ...saved });
          setLoaded(true);
        });
      }, []);

      const persist = useCallback((s) => {
        setSaveAnim(true);
        setLastSaved(Date.now());
        saveApp(s);
        setTimeout(() => setSaveAnim(false), 800);
      }, []);

      // Human-readable "il y a X" label, refreshed every 30s
      const [, forceRender] = useState(0);
      useEffect(() => {
        const t = setInterval(() => forceRender(n => n+1), 30000);
        return () => clearInterval(t);
      }, []);
      const savedLabel = (() => {
        if (!lastSaved) return null;
        const sec = Math.floor((Date.now() - lastSaved) / 1000);
        if (sec < 10)  return "à l'instant";
        if (sec < 60)  return `il y a ${sec}s`;
        const min = Math.floor(sec / 60);
        if (min < 60)  return `il y a ${min} min`;
        return `il y a ${Math.floor(min/60)}h`;
      })();
      const updateApp = useCallback((fn) => { setAppState(prev => { const next=fn(prev); persist(next); return next; }); }, [persist]);

      // Set pts for a unit (stored in ptsMap keyed by "faction:unitId")
      const handleSetPts = useCallback((unitId, faction, pts) => {
        updateApp(s => ({ ...s, ptsMap:{ ...s.ptsMap, [`${faction}:${unitId}`]: pts } }));
      }, [updateApp]);

      // ── Export / Import ──────────────────────────────────────
      const exportData = () => {
        const data = JSON.stringify(appState, null, 2);
        const blob = new Blob([data], { type:"application/json" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        const date = new Date().toISOString().slice(0,10);
        a.href = url; a.download = `black-templars-${date}.json`;
        a.click(); URL.revokeObjectURL(url);
      };
      const importData = (file) => {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const parsed = JSON.parse(e.target.result);
            if (!parsed.inventory || !parsed.lists) { alert("Fichier invalide."); return; }
            const confirmed = window.confirm(`Importer ${parsed.inventory.length} figurines et ${parsed.lists.length} listes ?

Cela remplacera les données actuelles.`);
            if (!confirmed) return;
            const next = { inventory:[], lists:[], ptsMap:{}, ...parsed };
            setAppState(next);
            saveApp(next);
            setSplashDone(true);
            alert("Import réussi ✓");
          } catch { alert("Erreur de lecture du fichier."); }
        };
        reader.readAsText(file);
      };

      const createList    = m  => updateApp(s => ({ ...s, lists:[...s.lists,{id:Date.now(),...m,entries:[]}] }));
      const deleteList    = id => updateApp(s => ({ ...s, lists:s.lists.filter(l=>l.id!==id) }));
      const deleteEntry   = (listId,entryId) => updateApp(s => ({ ...s, lists:s.lists.map(l=>l.id!==listId?l:{...l,entries:l.entries.filter(e=>e.id!==entryId)}) }));
      const toggleWarlord = (listId,entryId) => updateApp(s => ({
        ...s, lists: s.lists.map(l => l.id!==listId ? l : {
          ...l, entries: l.entries.map(e => ({ ...e, warlord: e.id===entryId ? !e.warlord : false }))
        })
      }));
      const addInventory  = entry => updateApp(s => {
        const ex = s.inventory.find(i=>i.unitId===entry.unitId&&i.faction===entry.faction);
        if(ex) return {...s,inventory:s.inventory.map(i=>i.id===ex.id?{...i,qty:i.qty+entry.qty}:i)};
        return {...s,inventory:[...s.inventory,{id:Date.now(),...entry}]};
      });
      const deleteInventory = id => updateApp(s => ({ ...s, inventory:s.inventory.filter(i=>i.id!==id) }));
      const updatePhoto     = (id,photo) => updateApp(s => ({ ...s, inventory:s.inventory.map(i=>i.id===id?{...i,photo}:i) }));
      const updatePaint     = (id,status) => updateApp(s => ({ ...s, inventory:s.inventory.map(i=>i.id===id?{...i,paintStatus:status}:i) }));
      const updateQty       = (id,qty)    => updateApp(s => ({ ...s, inventory:s.inventory.map(i=>i.id===id?{...i,qty:Math.max(1,qty)}:i) }));
      // Reorder: move draggedId to position of targetId within same faction
      const reorderInventory = (draggedId, targetId, faction) => updateApp(s => {
        const inv = [...s.inventory];
        const dragIdx  = inv.findIndex(i=>i.id==draggedId);
        const targetIdx = inv.findIndex(i=>i.id==targetId);
        if (dragIdx<0||targetIdx<0) return s;
        const [moved] = inv.splice(dragIdx,1);
        inv.splice(targetIdx,0,moved);
        return { ...s, inventory: inv };
      });
      const addEntry = (listId,entry) => updateApp(s => {
        let inv=s.inventory, invId=entry.inventoryId;
        if(!invId) {
          const ni={id:Date.now(),unitId:entry.unitId,faction:entry.faction,qty:entry.qty,paintStatus:"unpainted"};
          inv=[...inv,ni]; invId=ni.id;
        }
        return {...s,inventory:inv,lists:s.lists.map(l=>l.id!==listId?l:{...l,entries:[...(l.entries||[]),{id:Date.now()+1,inventoryId:invId,unitId:entry.unitId,qty:entry.qty}]})};
      });

      if (!loaded) return (
        <div style={{ background:"#020202", height:"100vh", maxWidth:"430px", margin:"0 auto", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", position:"relative", overflow:"hidden", fontFamily:"'Cinzel',serif" }}>
          {/* Background texture cross */}
          <div style={{ position:"absolute", fontSize:"320px", color:"#060504", lineHeight:1, fontFamily:"serif", pointerEvents:"none", userSelect:"none", animation:"breathe 4s ease-in-out infinite" }}>✠</div>
          {/* Vignette */}
          <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at center, transparent 30%, #020202 100%)", pointerEvents:"none" }} />
          {/* Content */}
          <div style={{ position:"relative", display:"flex", flexDirection:"column", alignItems:"center", gap:"0", animation:"splashIn 0.7s ease both" }}>
            {/* Main cross */}
            <div style={{ fontSize:"72px", color:"#b8922a", lineHeight:1, textShadow:"0 0 60px #b8922a66, 0 0 120px #b8922a22", animation:"crossGrow 0.6s cubic-bezier(0.34,1.56,0.64,1) both" }}>✠</div>
            <div style={{ marginTop:"20px", textAlign:"center" }}>
              <div style={{ color:"#e8dfc0", fontSize:"22px", letterSpacing:"8px", fontFamily:"'Cinzel Decorative',serif", fontWeight:"900", textShadow:"0 0 40px #b8922a33" }}>BLACK TEMPLARS</div>
              <div style={{ color:"#2a2010", fontSize:"8px", letterSpacing:"6px", marginTop:"6px" }}>CODEX ASTARTES · REGISTRE DE CROISADE</div>
            </div>
            {/* Ornamental divider */}
            <div style={{ display:"flex", alignItems:"center", gap:"10px", margin:"20px 0", width:"220px" }}>
              <div style={{ flex:1, height:"1px", background:"linear-gradient(90deg,transparent,#b8922a44)" }} />
              <div style={{ color:"#3a3020", fontSize:"10px" }}>✦</div>
              <div style={{ flex:1, height:"1px", background:"linear-gradient(90deg,#b8922a44,transparent)" }} />
            </div>
            {/* Loading pulse */}
            <div style={{ color:"#252015", fontSize:"8px", letterSpacing:"5px", animation:"pulse 1.5s ease-in-out infinite" }}>CHARGEMENT DU GRIMOIRE</div>
          </div>
        </div>
      );



      const ptsMap = appState.ptsMap || {};
      const activeList = appState.lists.find(l=>l.id===activeListId);

      return (
        <div className="vignette-wrap" style={{ background:"#020202", maxWidth:"430px", margin:"0 auto", height:"100vh", display:"flex", flexDirection:"column", position:"relative", overflow:"hidden" }}>
          {/* Splash overlay — shown on first open after load */}
          {!splashDone && <SplashOverlay inventory={appState.inventory} lists={appState.lists} ptsMap={ptsMap} onDone={() => setSplashDone(true)} />}
          {/* Save indicator — persistent bottom-right label */}
          {savedLabel && (
            <div style={{ position:"fixed", bottom:"72px", right:"12px", zIndex:200, display:"flex", alignItems:"center", gap:"5px",
              background: saveAnim ? "#0f0c06" : "#060402",
              border: `1px solid ${saveAnim ? "#b8922a66" : "#0f0f0f"}`,
              padding:"4px 10px", transition:"all 0.4s", pointerEvents:"none" }}>
              <div style={{ width:"5px", height:"5px", borderRadius:"50%",
                background: saveAnim ? "#b8922a" : "#2a4a2a",
                boxShadow: saveAnim ? "0 0 6px #b8922a" : "none",
                transition:"all 0.4s" }} />
              <span style={{ color: saveAnim ? "#b8922a" : "#2a4a2a", fontSize:"8px", fontFamily:"'Cinzel',serif", letterSpacing:"2px", transition:"color 0.4s" }}>
                {saveAnim ? "SAUVEGARDE..." : `SAUVEGARDÉ ${savedLabel.toUpperCase()}`}
              </span>
            </div>
          )}

          <div style={{ flex:1, overflowY:"auto", paddingBottom:"64px" }}>
            {activeView==="lists" && !activeList && <ViewLists lists={appState.lists} inventory={appState.inventory} ptsMap={ptsMap} onSelect={setActiveListId} onCreate={createList} onDelete={deleteList} />}
            {activeView==="lists" && activeList && <ViewListDetail list={activeList} inventory={appState.inventory} ptsMap={ptsMap} onSetPts={handleSetPts} onBack={() => setActiveListId(null)} onAddEntry={addEntry} onDeleteEntry={id => deleteEntry(activeListId,id)} onToggleWarlord={id => toggleWarlord(activeListId,id)} />}
            {activeView==="inventory" && <ViewInventory inventory={appState.inventory} ptsMap={ptsMap} onSetPts={handleSetPts} onAdd={addInventory} onDelete={deleteInventory} onUpdatePhoto={updatePhoto} onUpdatePaint={updatePaint} onUpdateQty={updateQty} onReorder={reorderInventory} />}
            {activeView==="stats" && <ViewStats inventory={appState.inventory} lists={appState.lists} ptsMap={ptsMap} />}
            {activeView==="codex" && <ViewCodex onExport={exportData} onImport={importData} inventory={appState.inventory} lists={appState.lists} />}
          </div>

          {!activeList && (
            <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:"430px", zIndex:50, background:"#030202", borderTop:"1px solid #0f0f0f", display:"flex" }}>
              <div style={{ position:"absolute", top:0, left:"15%", right:"15%", height:"1px", background:"linear-gradient(90deg,transparent,#b8922a44,transparent)" }} />
              <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#131313", fontSize:"14px" }}>✠</div>
              {[
                { key:"lists",     symbol:"✠", label:"CROISADE" },
                { key:"inventory", symbol:"⚜", label:"RELIQUES" },
                { key:"stats",     symbol:"◈", label:"STATS"    },
                { key:"codex",     symbol:"⚙", label:"CODEX"    },
              ].map(t => (
                <button key={t.key} onClick={() => setActiveView(t.key)} style={{ flex:1, background:"none", border:"none", borderTop:activeView===t.key?"2px solid #b8922a":"2px solid transparent", padding:"13px 0 12px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:"5px" }}>
                  <span style={{ fontSize:"17px", lineHeight:1, color:activeView===t.key?"#b8922a":"#1c1a18", textShadow:activeView===t.key?"0 0 16px #b8922a99":"none" }}>{t.symbol}</span>
                  <span style={{ fontSize:"7px", fontFamily:"'Cinzel',serif", letterSpacing:"3px", color:activeView===t.key?"#b8922a":"#1c1a18" }}>{t.label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
