    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);

    #root { height: 100%; }

    @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes breathe    { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:.8;transform:scale(1.01)} }
    @keyframes slideUp    { from{transform:translateY(6px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes slideLeft  { from{transform:translateX(-8px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes goldPulse  { 0%,100%{text-shadow:0 0 10px #b8922a33} 50%{text-shadow:0 0 25px #b8922a77,0 0 50px #b8922a22} }
    @keyframes splashIn   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes splashFade { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

    ::-webkit-scrollbar       { width: 2px; }

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open("wh40k-codex", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("appdata");
        req.onsuccess = e => resolve(e.target.result);
        req.onerror   = e => reject(e.target.error);
      });
    }
    async function loadApp() {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction("appdata", "readonly");
          const req = tx.objectStore("appdata").get("state");
          req.onsuccess = e => resolve(e.target.result || null);
          req.onerror   = () => resolve(null);
        });
      } catch { return null; }
    }
    async function saveApp(d) {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction("appdata", "readwrite");
          tx.objectStore("appdata").put(d, "state");
          tx.oncomplete = resolve;
          tx.onerror    = resolve;
        });
      } catch {}
    }

    function PtsBadge({ unitId, faction, qty=1, pts, onSetPts }) {
      const f = FACTIONS[faction];
      const [editing, setEditing] = useState(false);
      const [editVal, setEditVal] = useState("");
      const inputRef = useRef(null);
      useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);

      // Lookup unit name to get default pts from POINTS_DB
      const unit = UNITS_DB[faction]?.find(u => u.id === unitId);
      const defaultPts = unit ? POINTS_DB[unit.name] : null;
      // Use manual override if set, otherwise fall back to POINTS_DB
      const effectivePts = pts || defaultPts;
      const isDefault = !pts && !!defaultPts;  // true = from DB, not manually set
      const total = effectivePts ? effectivePts * qty : null;

      const confirm = () => {
        const n = parseInt(editVal);
        if (!isNaN(n) && n > 0) onSetPts(unitId, faction, n);
        setEditing(false); setEditVal("");
      };
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"3px" }}>
          {editing ? (
            <div style={{ display:"flex", gap:"4px", alignItems:"center" }}>
              <input ref={inputRef} type="number" value={editVal} onChange={e => setEditVal(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter") confirm(); if(e.key==="Escape") setEditing(false); }}
                placeholder={effectivePts||"pts"}
                style={{ width:"60px", background:"#030303", border:`1px solid ${f.accent}`, color:f.accent, padding:"4px 6px", fontSize:"13px", fontFamily:"monospace", outline:"none", textAlign:"center" }} />
              <button onClick={confirm} style={{ background:`${f.accent}33`, border:`1px solid ${f.accent}`, color:f.accent, cursor:"pointer", padding:"6px 12px", fontSize:"14px", touchAction:"manipulation" }}>✓</button>
              <button onClick={() => setEditing(false)} style={{ background:"none", border:"1px solid #1c1c1c", color:"#48402e", cursor:"pointer", padding:"6px 12px", fontSize:"14px", touchAction:"manipulation" }}>✕</button>
            </div>
          ) : (
            <div onClick={() => { setEditVal(effectivePts||""); setEditing(true); }} title={isDefault?"Points MFM (toucher pour modifier)":"Toucher pour modifier les points"}
              style={{ background:effectivePts?`${f.accent}22`:"#131313", border:`1px solid ${effectivePts?f.accent+"66":"#333"}`, padding:"4px 10px", display:"flex", alignItems:"center", minWidth:"70px", justifyContent:"center", cursor:"pointer", flexDirection:"column", gap:"1px" }}>
              {effectivePts
                ? <>
                    <span style={{ color:f.accent, fontWeight:"900", fontFamily:"monospace", fontSize:"15px" }}>{total} pts</span>
                    {isDefault && <span style={{ color:`${f.accent}55`, fontSize:"7px", letterSpacing:"1px" }}>MFM</span>}
                  </>
                : <span style={{ color:"#46402a", fontSize:"11px" }}>+ pts</span>
              }
            </div>
          )}

        </div>
      );
    }

    function useTotalPts(entries, faction, ptsMap) {
      return entries.reduce((sum, e) => {
        const manual = ptsMap[`${faction}:${e.unitId}`];
        const unit = UNITS_DB[faction]?.find(u => u.id === e.unitId);
        const p = manual || (unit ? POINTS_DB[unit.name] : 0) || 0;
        return sum + p * e.qty;
      }, 0);
    }

    // Wahapedia URL: spaces→hyphens, Title-Case each word, remove apostrophes/special chars
    // Format: wahapedia.ru/wh40k10ed/factions/[faction]/[Unit-Name]
    const WAHA_FACTIONS = {
      "SM": "space-marines",
      "TY": "tyranids",
      "IK": "imperial-knights",
    };

    function wahapediaUrl(unitName, faction) {
      const factionSlug = WAHA_FACTIONS[faction] || "space-marines";
      const slug = unitName
        .replace(/([a-z])'([A-Z])/g, "$1-$2") // apostrophe before uppercase → hyphen (El'Jonson → El-Jonson)
        .replace(/'/g, "")                      // all other apostrophes → remove (Kor'sarro, 's, etc.)
        .replace(/[^a-zA-Z0-9\s-]/g, "")      // other special chars → remove
        .trim()
        .split(/\s+/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1)) // Title-Case each word
        .join("-");
      return `https://wahapedia.ru/wh40k10ed/factions/${factionSlug}/${slug}`;
    }

    function PhotoPicker({ photo, onPhoto, accent, size=64 }) {
      const cameraRef = useRef(null);

      const handleFile = (e) => {
        const file = e.target.files[0]; if (!file) return;
        e.target.value = "";
        const reader = new FileReader();
        reader.onload = (ev) => onPhoto(ev.target.result);

        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"12px", width:"100%" }}>
          <div style={{ width:size, height:size, overflow:"hidden", border:`1px solid ${photo?accent+"66":"#1c1c1c"}`, background:"#040404", display:"flex", alignItems:"center", justifyContent:"center" }}>

          <input ref={galleryRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }} />
        </div>
      );
      return (
        <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
          <div style={{ width:size, height:size, overflow:"hidden", border:`1px solid ${photo?accent+"55":"#1c1c1c"}`, background:"#040404", display:"flex", alignItems:"center", justifyContent:"center" }}>
            {photo ? <img src={photo} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <span style={{ fontSize:"20px", opacity:0.2 }}>✠</span>}

          <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>

            <Input value={name} onChange={e => setName(e.target.value)} placeholder="Ex: Tournoi Paris…" />
            <Label>Faction</Label>
            <div style={{ display:"flex", gap:"8px", marginBottom:"16px" }}>
              {Object.entries(FACTIONS).map(([k,v]) => <FactionPill key={k} f={v} active={faction===k} onClick={() => setFaction(k)} />)}
            </div>
            <Label>Points maximum</Label>
            <div style={{ display:"flex", gap:"8px", marginBottom:"20px", flexWrap:"wrap" }}>
              {[500,1000,1500,2000,2500,3000].map(p => (
                <button key={p} onClick={() => setMaxPts(p)} style={{ ...btnSm, borderColor:maxPts===p?f.accent:"#333", color:maxPts===p?f.accent:"#666", background:maxPts===p?`${f.accent}15`:"transparent" }}>{p}</button>

    // ══════════════════════════════════════════════════════════
    // MODAL ADD UNIT
    // ══════════════════════════════════════════════════════════

    function ModalAddUnit({ faction, inventory, onClose, onAdd, mode="list" }) {
      const f = FACTIONS[faction];
      const units = UNITS_DB[faction]||[];
      const [selected, setSelected] = useState(null);
      const [qty, setQty] = useState(1);
      const [paint, setPaint] = useState("unpainted");
      const [search, setSearch] = useState("");
      const [chapterFilter, setChapterFilter] = useState("Tous");
      const [photo, setPhoto] = useState(null);

      const chapters = faction==="SM" ? ["Tous",...new Set(units.map(u=>u.chapter).filter(Boolean))] : [];
      const available = mode==="list" ? units.filter(u => inventory.some(i => i.unitId===u.id && i.faction===faction)) : units;
      const filtered = available
        .filter(u => chapterFilter==="Tous" || !u.chapter || u.chapter===chapterFilter || u.chapter==="Générique")
        .filter(u => u.name.toLowerCase().includes(search.toLowerCase()));
      const grouped = filtered.reduce((acc,u) => { if(!acc[u.role]) acc[u.role]=[]; acc[u.role].push(u); return acc; }, {});

      return (
        <Overlay>
          <Sheet accent={f.accent}>
            <SheetHeader title={mode==="list"?"Ajouter à la liste":"Ajouter à l'inventaire"} onClose={onClose} accent={f.accent} />
            <Input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher…" style={{ marginBottom:"8px" }} />
            {faction==="SM" && (
              <div style={{ display:"flex", gap:"6px", overflowX:"auto", marginBottom:"10px", paddingBottom:"4px" }}>
                {chapters.map(ch => (
                  <button key={ch} onClick={() => setChapterFilter(ch)} style={{ ...btnSm, whiteSpace:"nowrap", fontSize:"10px", borderColor:chapterFilter===ch?f.accent:"#333", color:chapterFilter===ch?f.accent:"#555", background:chapterFilter===ch?`${f.accent}15`:"transparent" }}>{ch}</button>
                ))}
              </div>
            )}
            <div style={{ overflowY:"auto", maxHeight:"28vh", marginBottom:"16px" }}>
              {Object.entries(grouped).map(([role,roleUnits]) => (
                <div key={role}>
                  <div style={{ color:"#35281a", fontSize:"10px", letterSpacing:"2px", padding:"6px 4px 4px", fontFamily:"'Cinzel',serif" }}>{role.toUpperCase()}</div>
                  {roleUnits.map(u => (
                    <div key={u.id} onClick={() => setSelected(u.id)} style={{ padding:"9px 12px", marginBottom:"3px", background:selected===u.id?`${f.accent}22`:"#111", border:`1px solid ${selected===u.id?f.accent:"#222"}`, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ color:selected===u.id?"#fff":"#ccc", fontSize:"13px" }}>{u.name}</div>
                        {u.chapter && u.chapter!=="Générique" && <div style={{ color:f.accent, fontSize:"10px", opacity:0.7 }}>{u.chapter}</div>}
                      </div>
                      <span style={{ color:f.accent, fontSize:"16px" }}>✦</span>
                    </div>
                  ))}
                </div>
              ))}
              {filtered.length===0 && <div style={{ color:"#46402a", textAlign:"center", padding:"20px", fontSize:"13px" }}>Aucun résultat</div>}
            </div>
            {selected && (
              <>
                <Label>Quantité</Label>
                <div style={{ display:"flex", gap:"10px", alignItems:"center", marginBottom:"16px" }}>
                  <button onClick={() => setQty(Math.max(1,qty-1))} style={qtyBtn}>−</button>
                  <span style={{ color:"#e8dfc0", fontSize:"20px", fontWeight:"700", minWidth:"30px", textAlign:"center" }}>{qty}</span>
                  <button onClick={() => setQty(qty+1)} style={qtyBtn}>+</button>
                </div>
                {mode==="inventory" && (
                  <>
                    <Label>Statut peinture</Label>
                    <div style={{ display:"flex", gap:"6px", marginBottom:"16px", flexWrap:"wrap" }}>
                      {Object.entries(PAINT_STATUS).map(([k,v]) => (
                        <button key={k} onClick={() => setPaint(k)} style={{ ...btnSm, borderColor:paint===k?v.color:"#333", color:paint===k?"#fff":"#666", background:paint===k?`${v.color}33`:"transparent" }}>{v.label}</button>
                      ))}
                    </div>
                    <Label>Photo (optionnel)</Label>
                    <div style={{ marginBottom:"16px" }}>
                      <PhotoPicker photo={photo} onPhoto={setPhoto} accent={f.accent} size={80} />
                    </div>
                  </>
                )}
              </>
            )}
            <PrimaryBtn color={f.accent} onClick={() => {
              if(!selected) return;
              // In list mode, link to an existing inventory item if available
              // In inventory mode, always create a new separate entry
              const invItem = mode==="list" ? inventory.find(i => i.unitId===selected && i.faction===faction) : null;
              onAdd({ unitId:selected, faction, qty, paintStatus:paint, photo, inventoryId:invItem?.id });
              onClose();
            }}>
              AJOUTER
            </PrimaryBtn>
          </Sheet>
        </Overlay>
      );
    }

    // ══════════════════════════════════════════════════════════
    // VIEW: Lists
    // ══════════════════════════════════════════════════════════

    function ViewLists({ lists, inventory, ptsMap, onSelect, onCreate, onDelete }) {
      const [showModal, setShowModal] = useState(false);
      return (
        <div style={pageStyle} className={`bg-lists`}>
          <div style={{ background:"linear-gradient(180deg,#0a0808 0%,#050505 100%)", borderBottom:"1px solid #131313", padding:"20px 16px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", right:"60px", top:"50%", transform:"translateY(-50%)", fontSize:"80px", color:"#0f0f0f", fontFamily:"serif", pointerEvents:"none", lineHeight:1 }}>✠</div>
            <div>
              <div style={{ color:"#b8922a", fontSize:"9px", letterSpacing:"5px", fontFamily:"'Cinzel',serif", marginBottom:"4px", opacity:0.6 }}>CODEX ASTARTES</div>
              <div style={{ color:"#e8dfc0", fontSize:"22px", fontFamily:"'Cinzel Decorative','Cinzel',serif", letterSpacing:"3px", fontWeight:"900", textShadow:"0 0 30px #b8922a33", lineHeight:1 }}>CROISADE</div>
              <div style={{ color:"#35281a", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Cinzel',serif", marginTop:"4px" }}>
                {lists.length} LISTE{lists.length!==1?"S":""} · {lists.reduce((s,l)=>s+(l.entries||[]).length,0)} UNITÉS
              </div>
            </div>
            <IconBtn onClick={() => setShowModal(true)}><Ic.Plus /></IconBtn>
          </div>
          <div style={{ padding:"12px 16px", flex:1, overflowY:"auto" }}>
            <div style={{ background:"#100e0c", border:"1px solid #222", borderLeft:"3px solid #b8922a", padding:"10px 14px", marginBottom:"20px", display:"flex", alignItems:"center", gap:"12px" }}>
              <span style={{ fontSize:"18px", opacity:0.7 }}>✠</span>
              <div>
                <div style={{ color:"#b8922a", fontSize:"10px", fontFamily:"'Cinzel',serif", letterSpacing:"2px" }}>POINTS VIA WAHAPEDIA</div>
                <div style={{ color:"#35281a", fontSize:"11px", marginTop:"2px", fontStyle:"italic" }}>Mis à jour automatiquement par l'oracle</div>
              </div>
            </div>
            {lists.length===0 && <EmptyState icon="✠" title="Aucune croisade" sub="Forgez votre première liste d'armée" />}
            {lists.map((list, idx) => {
              const f = FACTIONS[list.faction];
              const pts = (list.entries||[]).reduce((sum,e) => {
                const manual = ptsMap[`${list.faction}:${e.unitId}`];
                const unit = UNITS_DB[list.faction]?.find(u=>u.id===e.unitId);
                const p = manual || (unit ? POINTS_DB[unit.name] : 0) || 0;
                return sum + p * e.qty;
              }, 0);
              const pct = Math.min(100, pts/list.maxPts*100);
              return (
                <div key={list.id} onClick={() => onSelect(list.id)} className="hcard" style={{ background:"linear-gradient(180deg,#1c1916 0%,#151210 100%)", border:"1px solid #252220", borderTop:`2px solid ${f.accent}`, padding:"16px", marginBottom:"10px", cursor:"pointer", position:"relative", overflow:"hidden", animation:`slideUp 0.25s ${idx*60}ms ease both` }}>
                  <div style={{ position:"absolute", top:"6px", right:"8px", color:f.accent, fontSize:"10px", opacity:0.25 }}>✠</div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <div style={{ color:"#e8dfc0", fontSize:"16px", fontFamily:"'Cinzel',serif", letterSpacing:"1px", fontWeight:"700" }}>{list.name}</div>
                      <div style={{ color:f.accent, fontSize:"11px", marginTop:"4px", letterSpacing:"1px", fontFamily:"'Cinzel',serif" }}>{f.icon}  {f.label.toUpperCase()}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ color:"#e8dfc0", fontSize:"24px", fontWeight:"900", fontFamily:"'Cinzel',serif" }}>{pts}</div>
                      <div style={{ color:"#35281a", fontSize:"10px", letterSpacing:"1px" }}>/ {list.maxPts} pts</div>
                    </div>
                  </div>
                  <div style={{ marginTop:"14px", background:"#0d0d0d", height:"3px", overflow:"hidden" }}>
                    <div style={{ width:`${pct}%`, height:"100%", background:pct>95?"#7a1515":f.accent, transition:"width 0.4s" }} />
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:"8px", alignItems:"center" }}>
                    <div style={{ color:"#35281a", fontSize:"11px", fontStyle:"italic" }}>{(list.entries||[]).length} frères de bataille</div>
                    <button onClick={e => { e.stopPropagation(); onDelete(list.id); }} style={{ background:"none", border:"none", color:"#151515", cursor:"pointer" }}><Ic.Trash /></button>
                  </div>
                </div>
              );
            })}
          </div>
          {showModal && <ModalCreateList onClose={() => setShowModal(false)} onCreate={onCreate} />}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // VIEW: List Detail
    // ══════════════════════════════════════════════════════════

    function ViewListDetail({ list, inventory, ptsMap, onSetPts, onBack, onAddEntry, onDeleteEntry, onToggleWarlord, onRename, onSetMaxPts }) {
      const [showModal, setShowModal] = useState(false);
      const [editingName, setEditingName] = useState(false);
      const [editingMaxPts, setEditingMaxPts] = useState(false);
      const [maxPtsVal, setMaxPtsVal] = useState(String(list.maxPts));
      const maxPtsRef = useRef(null);
      useEffect(() => { if (editingMaxPts && maxPtsRef.current) maxPtsRef.current.focus(); }, [editingMaxPts]);
      const confirmMaxPts = () => {
        const n = parseInt(maxPtsVal);
        if (!isNaN(n) && n > 0) onSetMaxPts(n);
        setEditingMaxPts(false);
      };
      const [nameVal, setNameVal] = useState(list.name);
      const nameRef = useRef(null);
      useEffect(() => { if (editingName && nameRef.current) nameRef.current.focus(); }, [editingName]);
      const confirmRename = () => {
        const v = nameVal.trim();
        if (v && v !== list.name) onRename(v);
        setEditingName(false);
      };
      const f = FACTIONS[list.faction];
      const entries = (list.entries||[]).map(e => ({ ...e, inv:inventory.find(i=>i.id===e.inventoryId) }));
      const pts = useTotalPts(list.entries||[], list.faction, ptsMap);
      const pct = Math.min(100, pts/list.maxPts*100);
      const chars  = entries.filter(e => { const u=UNITS_DB[list.faction]?.find(u=>u.id===e.unitId); return u&&(u.role==="QG"||u.role==="Seigneur de guerre"); });
      const others = entries.filter(e => { const u=UNITS_DB[list.faction]?.find(u=>u.id===e.unitId); return u&&u.role!=="QG"&&u.role!=="Seigneur de guerre"; });

      const Section = ({ title, items }) => {
        if (items.length===0) return null;
        const sectionPts = items.reduce((sum,e) => {
          const manual = ptsMap[`${list.faction}:${e.unitId}`];
          const unit = UNITS_DB[list.faction]?.find(u=>u.id===e.unitId);
          const p = manual || (unit ? POINTS_DB[unit.name] : 0) || 0;
          return sum + p * e.qty;
        }, 0);
        const sectionPct = list.maxPts ? Math.round(sectionPts/list.maxPts*100) : 0;
        return (
          <div style={{ marginBottom:"28px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                <div style={{ width:"2px", height:"14px", background:"#b8922a", opacity:0.5 }} />
                <span style={{ color:"#6a5a4a", fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"4px" }}>{title}</span>
                <span style={{ color:"#252015", fontSize:"9px" }}>{items.length}</span>
              </div>
              {sectionPts>0 && (
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <span style={{ color:"#35281a", fontSize:"9px" }}>{sectionPct}%</span>
                  <span style={{ color:f.accent, fontFamily:"monospace", fontSize:"13px", fontWeight:"700" }}>{sectionPts} pts</span>
                </div>
              )}
            </div>
            {sectionPts>0 && (
              <div style={{ height:"2px", background:"#0a0806", marginBottom:"10px" }}>
                <div style={{ width:`${sectionPct}%`, height:"100%", background:`${f.accent}66`, transition:"width 0.4s" }} />
              </div>
            )}
            {items.map((e,idx) => (
              <div key={idx} style={{ animation:`slideLeft 0.2s ${idx*30}ms ease both` }}>
                <UnitRow entry={e} faction={list.faction} ptsMap={ptsMap} onSetPts={onSetPts} onDelete={() => onDeleteEntry(e.id)} onToggleWarlord={onToggleWarlord} />
              </div>
            ))}
          </div>
        );
      };

      return (
        <div style={pageStyle} className={`bg-lists`}>
          <div style={{ background:"linear-gradient(180deg,#0a0808 0%,#060606 100%)", borderBottom:`1px solid ${f.accent}33`, padding:"12px 16px", display:"flex", alignItems:"center", gap:"12px" }}>
            <IconBtn onClick={onBack}><Ic.Back /></IconBtn>
            <div style={{ display:"flex", alignItems:"center", gap:"12px", flex:1 }}>
              <div style={{ width:"38px", height:"38px", border:`1px solid ${f.accent}55`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"20px", background:"#050505", flexShrink:0 }}>{f.icon}</div>
              <div style={{ flex:1 }}>
                {editingName ? (
                  <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                    <input ref={nameRef} value={nameVal} onChange={e=>setNameVal(e.target.value)}
                      onKeyDown={e=>{ if(e.key==="Enter") confirmRename(); if(e.key==="Escape") setEditingName(false); }}
                      style={{ flex:1, background:"#060402", border:`1px solid ${f.accent}66`, color:"#e8dfc0", padding:"5px 8px", fontSize:"14px", fontFamily:"'Cinzel',serif", outline:"none", letterSpacing:"1px" }} />
                    <button onClick={confirmRename} style={{ background:`${f.accent}33`, border:`1px solid ${f.accent}`, color:f.accent, cursor:"pointer", padding:"5px 10px", fontSize:"14px" }}>✓</button>
                    <button onClick={()=>setEditingName(false)} style={{ background:"none", border:"1px solid #1c1c1c", color:"#48402e", cursor:"pointer", padding:"5px 10px", fontSize:"14px" }}>✕</button>
                  </div>
                ) : (
                  <button onClick={()=>{ setNameVal(list.name); setEditingName(true); }}
                    style={{ background:"none", border:"none", cursor:"pointer", textAlign:"left", padding:0, display:"flex", alignItems:"center", gap:"8px" }}>
                    <div style={{ color:"#e8dfc0", fontSize:"15px", fontFamily:"'Cinzel',serif", letterSpacing:"1px", fontWeight:"700" }}>{list.name}</div>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#2a2215" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                )}
                {!editingName && <div style={{ color:f.accent, fontSize:"10px", letterSpacing:"2px", fontFamily:"'Cinzel',serif", marginTop:"2px" }}>{f.label.toUpperCase()}</div>}
              </div>
            </div>
            <IconBtn onClick={() => setShowModal(true)}><Ic.Plus /></IconBtn>
          </div>
          <div style={{ background:"#030303", padding:"12px 16px", borderBottom:"1px solid #131313" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:"8px" }}>
              <div>
                <div style={{ color:"#35281a", fontSize:"9px", letterSpacing:"3px", fontFamily:"'Cinzel',serif", marginBottom:"4px" }}>POINTS DE CROISADE</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:"4px" }}>
                  <span style={{ color:pct>95?"#7a1515":"#e8dfc0", fontSize:"28px", fontFamily:"'Cinzel',serif", fontWeight:"900", lineHeight:1 }}>{pts}</span>
                  {editingMaxPts ? (
                    <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                      <span style={{ color:"#35281a", fontSize:"13px" }}>/</span>
                      <input ref={maxPtsRef} type="number" value={maxPtsVal} onChange={e=>setMaxPtsVal(e.target.value)}
                        onKeyDown={e=>{ if(e.key==="Enter") confirmMaxPts(); if(e.key==="Escape") setEditingMaxPts(false); }}
                        style={{ width:"70px", background:"#060402", border:`1px solid ${f.accent}66`, color:"#e8dfc0", padding:"3px 6px", fontSize:"13px", fontFamily:"'Cinzel',serif", outline:"none" }} />
                      <button onClick={confirmMaxPts} style={{ background:`${f.accent}33`, border:`1px solid ${f.accent}`, color:f.accent, cursor:"pointer", padding:"3px 8px", fontSize:"13px", touchAction:"manipulation" }}>✓</button>
                      <button onClick={()=>setEditingMaxPts(false)} style={{ background:"none", border:"1px solid #1c1c1c", color:"#48402e", cursor:"pointer", padding:"3px 8px", fontSize:"13px", touchAction:"manipulation" }}>✕</button>
                    </div>
                  ) : (
                    <button onClick={()=>{ setMaxPtsVal(String(list.maxPts)); setEditingMaxPts(true); }}
                      style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"baseline", gap:"4px", padding:0 }}>
                      <span style={{ color:"#35281a", fontSize:"13px", fontFamily:"'Cinzel',serif" }}>/ {list.maxPts}</span>
                      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#2a2215" strokeWidth="2" style={{marginBottom:"2px"}}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                  )}
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ color:pct>95?"#7a1515":"#3a3028", fontSize:"11px" }}>{list.maxPts-pts} pts restants</div>
              </div>
            </div>
            <div style={{ background:"#060606", height:"4px", position:"relative" }}>
              <div style={{ width:`${pct}%`, height:"100%", background:pct>95?"#7a1515":`linear-gradient(90deg,${f.accent}88,${f.accent})`, transition:"width 0.5s" }} />
              {[25,50,75].map(p => <div key={p} style={{ position:"absolute", top:0, left:`${p}%`, width:"1px", height:"100%", background:"#131313" }} />)}
            </div>
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"16px" }}>
            {entries.length===0 && <EmptyState icon={f.icon} title="Liste vide" sub="Ajoutez des unités depuis votre inventaire" />}
            <Section title="CHARACTERS" items={chars} />
            <Section title="OTHER DATASHEETS" items={others} />
          </div>
          {showModal && <ModalAddUnit faction={list.faction} inventory={inventory} mode="list" onClose={() => setShowModal(false)} onAdd={entry => onAddEntry(list.id, entry)} />}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // VIEW: Inventory
    // ══════════════════════════════════════════════════════════

    // Ordre des rôles pour l'affichage
    const ROLE_ORDER = ["QG","Seigneur de guerre","Troupes","Élite","Rapide","Lourd","Transport",
      "Armiger","Chevalier Questoris","Chevalier Dominus","Chevalier Cerastus","Chevalier Acastus"];

    const PAINT_KEYS = ["unpainted","primed","wip","painted"];

    function PaintCycleBtn({ status, onCycle }) {
      const ps = PAINT_STATUS[status]||PAINT_STATUS.unpainted;
      const [animKey, setAnimKey] = useState(0);
      const [showRipple, setShowRipple] = useState(false);
      const handleClick = () => {
        setAnimKey(k => k+1);
        setShowRipple(true);
        setTimeout(() => setShowRipple(false), 400);
        onCycle();
      };
      return (
        <button onClick={handleClick} title="Changer le statut de peinture"
          style={{ display:"flex", alignItems:"center", gap:"6px", padding:"6px 10px",
            background:"#0d0b08", border:`1px solid ${ps.color}66`, cursor:"pointer",
            transition:"border-color 0.3s, background 0.3s", touchAction:"manipulation",
            position:"relative", overflow:"hidden" }}>
          {/* Ripple effect */}
          {showRipple && (
            <div style={{ position:"absolute", inset:0, background:`${ps.color}22`,
              animation:"paintPop 0.35s ease both", borderRadius:"inherit", pointerEvents:"none" }} />
          )}
          <div key={animKey} style={{ width:"8px", height:"8px", borderRadius:"50%", background:ps.color, flexShrink:0,
            boxShadow:`0 0 6px ${ps.color}`, animation:"paintPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both" }} />
          <span key={animKey+"t"} style={{ fontSize:"10px", color:ps.color, fontFamily:"'Cinzel',serif", letterSpacing:"1px", whiteSpace:"nowrap",
            animation:"slideLeft 0.2s ease both" }}>{ps.label}</span>
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke={ps.color} strokeWidth="2.5" opacity="0.7"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      );
    }

    function QtyEditor({ qty, onUpdate, accent }) {
      return (
        <div style={{ display:"flex", alignItems:"center", gap:"2px" }}>
          <button onClick={() => qty>1 && onUpdate(qty-1)}
            style={{ width:"32px", height:"32px", background:"#0f0c08", border:`1px solid ${accent}55`, color: qty>1?accent:"#2a2215", cursor: qty>1?"pointer":"default", fontSize:"18px", lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center", touchAction:"manipulation" }}>−</button>
          <div style={{ minWidth:"30px", textAlign:"center", fontSize:"13px", color:accent, fontFamily:"monospace", fontWeight:"700", background:"#080604", border:`1px solid ${accent}33`, padding:"4px 6px" }}>{qty}</div>
          <button onClick={() => onUpdate(qty+1)}
            style={{ width:"32px", height:"32px", background:"#0f0c08", border:`1px solid ${accent}55`, color:accent, cursor:"pointer", fontSize:"18px", lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center", touchAction:"manipulation" }}>+</button>
        </div>
      );
    }

    function InventoryItem({ item, faction, ptsMap, onSetPts, onDelete, onEditPhoto, onUpdatePaint, onUpdateQty, accent, viewMode, dragHandleProps }) {
      const ps = PAINT_STATUS[item.paintStatus]||PAINT_STATUS.unpainted;
      const cycleStatus = () => {
        const idx = PAINT_KEYS.indexOf(item.paintStatus||"unpainted");
        const next = PAINT_KEYS[(idx+1) % PAINT_KEYS.length];
        onUpdatePaint(item.id, next);
      };
      const borderColor = item.paintStatus==="painted" ? PAINT_STATUS.painted.color
        : item.paintStatus==="wip" ? PAINT_STATUS.wip.color
        : item.paintStatus==="primed" ? PAINT_STATUS.primed.color
        : accent;

      // ── GRID CARD ─────────────────────────────────────────
      if (viewMode === "grid") {
        return (
          <div className="hcard card-stagger" style={{ background:f.bgCard||"linear-gradient(180deg,#181512 0%,#0e0c0a 100%)", border:`1px solid ${borderColor}22`, borderTop:`2px solid ${borderColor}`, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative", transition:"background 0.4s, border-color 0.3s" }}>
            {/* Photo zone — takes most of the card */}
            <div onClick={() => onEditPhoto(item)} style={{ height:"110px", cursor:"pointer", background:"#040404", position:"relative", overflow:"hidden" }}>
              {item.photo
                ? <img src={item.photo} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                : <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"4px" }}>
                    <span style={{ fontSize:"28px", opacity:0.12 }}>{faction==="SM"?"✠":faction==="TY"?"☠":"⚜"}</span>
                    <span style={{ color:accent, fontSize:"7px", opacity:0.3, fontFamily:"'Cinzel',serif", letterSpacing:"2px" }}>PHOTO</span>
                  </div>
              }
              {/* Paint dot top-right */}
              <div style={{ position:"absolute", top:"6px", right:"6px", width:"8px", height:"8px", borderRadius:"50%", background:ps.color, boxShadow:`0 0 6px ${ps.color}88` }} />
              {/* Gradient overlay */}
              <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(10,8,6,0.85) 0%,transparent 55%)" }} />
              {/* Name at bottom of photo */}
              <div style={{ position:"absolute", bottom:"6px", left:"7px", right:"7px" }}>
                <div style={{ color:"#e8dfc0", fontSize:"10px", fontFamily:"'Cinzel',serif", lineHeight:1.2, textShadow:"0 1px 4px #000" }}>
                  {item.qty>1 && <span style={{ color:accent, marginRight:"3px", fontSize:"9px" }}>×{item.qty}</span>}
                  {item.unit.name}
                </div>
              </div>
            </div>
            {/* Bottom controls */}
            <div style={{ padding:"7px 8px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"4px" }}>
              <QtyEditor qty={item.qty} accent={accent} onUpdate={n => onUpdateQty(item.id, n)} />
              <button onClick={cycleStatus} title="Changer statut peinture"
                style={{ display:"flex", alignItems:"center", gap:"3px", padding:"2px 6px", background:"#060402", border:`1px solid ${ps.color}33`, cursor:"pointer" }}>
                <div style={{ width:"5px", height:"5px", borderRadius:"50%", background:ps.color }} />
                <span style={{ fontSize:"7px", color:ps.color, fontFamily:"'Cinzel',serif" }}>{ps.label}</span>
              </button>
              <button onClick={() => onDelete(item.id)} style={{ background:"none", border:"none", color:"#181410", cursor:"pointer", padding:"2px" }}><Ic.Trash /></button>
            </div>
          </div>
        );
      }

      // ── LIST CARD (default) ────────────────────────────────
      return (
        <div className="hcard card-stagger" style={{ background:f.bgCard||"linear-gradient(180deg,#181512 0%,#121008 100%)", border:`1px solid ${borderColor}22`, borderLeft:`3px solid ${borderColor}`, marginBottom:"5px", display:"flex", alignItems:"stretch", transition:"background 0.4s, border-color 0.3s" }}>
          {/* Drag handle */}
          <div {...dragHandleProps} style={{ width:"22px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", cursor:"grab", borderRight:"1px solid #1a1a16", touchAction:"none" }}>
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><circle cx="3" cy="3" r="1.5" fill="#3a3020"/><circle cx="7" cy="3" r="1.5" fill="#3a3020"/><circle cx="3" cy="8" r="1.5" fill="#3a3020"/><circle cx="7" cy="8" r="1.5" fill="#3a3020"/><circle cx="3" cy="13" r="1.5" fill="#3a3020"/><circle cx="7" cy="13" r="1.5" fill="#3a3020"/></svg>
          </div>
          {/* Photo */}
          <div onClick={() => onEditPhoto(item)} style={{ width:"52px", flexShrink:0, cursor:"pointer", borderRight:"1px solid #0c0c0c", overflow:"hidden", position:"relative" }}>
            {item.photo ? (
              <>
                <img src={item.photo} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(0,0,0,0.65) 0%,transparent 45%)" }} />
                <div style={{ position:"absolute", bottom:"3px", right:"3px", fontSize:"8px" }}>📷</div>
              </>
            ) : (
              <div style={{ width:"100%", minHeight:"62px", height:"100%", background:"#040404", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"3px" }}>
                <span style={{ fontSize:"16px", opacity:0.2 }}>📷</span>
              </div>
            )}
          </div>
          {/* Content */}
          <div style={{ flex:1, padding:"10px 10px", display:"flex", alignItems:"center", gap:"8px" }}>
            <div style={{ flex:1 }}>
              <div style={{ color:"#e8dfc0", fontSize:"13px", fontFamily:"'Cinzel',serif", lineHeight:1.3 }}>
                {item.unit.name}
              </div>
              <div style={{ display:"flex", gap:"6px", marginTop:"6px", alignItems:"center", flexWrap:"wrap" }}>
                <PaintCycleBtn status={item.paintStatus||"unpainted"} onCycle={cycleStatus} />
                <WahapediaBtn unitName={item.unit.name} faction={faction} accent={accent} />
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"6px" }}>
              <QtyEditor qty={item.qty} accent={accent} onUpdate={n => onUpdateQty(item.id, n)} />
              <PtsBadge unitId={item.unit.id} faction={faction} qty={item.qty} pts={ptsMap[`${faction}:${item.unit.id}`]} onSetPts={onSetPts} />
              <button onClick={() => onDelete(item.id)} style={{ background:"none", border:"none", color:"#181410", cursor:"pointer", padding:"2px" }}><Ic.Trash /></button>
            </div>
          </div>
        </div>
      );
    }

    function ViewInventory({ inventory, ptsMap, onSetPts, onAdd, onDelete, onUpdatePhoto, onUpdatePaint, onUpdateQty, onReorder }) {
      const [showModal, setShowModal] = useState(false);
      const [editPhotoItem, setEditPhotoItem] = useState(null);
      const [faction, setFaction] = useState("IK");
      const [viewMode, setViewMode] = useState("list"); // "list" | "grid"
      const [collapsedRoles, setCollapsedRoles] = useState({});
      const dragState = useRef(null);
      const [draggingId, setDraggingId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      const f = FACTIONS[faction];

      const rawItems = inventory
        .filter(i=>i.faction===faction)
        .map(i => ({ ...i, unit:UNITS_DB[i.faction]?.find(u=>u.id===i.unitId) }))
        .filter(i=>i.unit);

      // Group by role, respecting custom order (inventory order within each role)
      const grouped = {};
      ROLE_ORDER.forEach(r => { grouped[r] = []; });
      rawItems.forEach(item => {
        const role = item.unit.role;
        if (!grouped[role]) grouped[role] = [];
        grouped[role].push(item);
      });
      const usedRoles = ROLE_ORDER.filter(r => grouped[r]?.length > 0);

      const toggleRole = (role) => setCollapsedRoles(prev => ({ ...prev, [role]: !prev[role] }));

      // Drag-and-drop handlers
      const onDragStart = (e, item, role) => {
        dragState.current = { id: item.id, role, startY: e.touches?.[0]?.clientY ?? e.clientY };
        setDraggingId(item.id);
        if (e.dataTransfer) { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", item.id); }
      };
      const onDragOver = (e, item) => {
        e.preventDefault();
        if (item.id !== draggingId) setDragOverId(item.id);
      };
      const onDrop = (e, targetItem) => {
        e.preventDefault();
        if (!dragState.current || dragState.current.id === targetItem.id) return;
        onReorder(dragState.current.id, targetItem.id, faction);
        setDraggingId(null); setDragOverId(null); dragState.current = null;
      };
      const onDragEnd = () => { setDraggingId(null); setDragOverId(null); dragState.current = null; };

      // Touch drag
      const onTouchStart = (e, item, role) => {
        dragState.current = { id: item.id, role, startY: e.touches[0].clientY };
        setDraggingId(item.id);
      };
      const onTouchMove = (e) => {
        if (!dragState.current) return;
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const card = el?.closest("[data-itemid]");
        if (card) setDragOverId(card.dataset.itemid);
      };
      const onTouchEnd = () => {
        if (!dragState.current || !dragOverId) { setDraggingId(null); setDragOverId(null); dragState.current = null; return; }
        onReorder(dragState.current.id, dragOverId, faction);
        setDraggingId(null); setDragOverId(null); dragState.current = null;
      };

      return (
        <div style={pageStyle} className={`bg-inventory`}>
          <div style={{ background:"#030202", borderBottom:"1px solid #0f0f0f", padding:"18px 16px 14px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", right:"14px", top:"50%", transform:"translateY(-50%)", fontSize:"72px", color:"#0b0a09", lineHeight:1, pointerEvents:"none", fontFamily:"serif" }}>✠</div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ color:"#b8922a", fontSize:"8px", letterSpacing:"5px", fontFamily:"'Cinzel',serif", opacity:0.6, marginBottom:"4px" }}>REGISTRE DES RELIQUES</div>
                <div style={{ color:"#e8dfc0", fontSize:"18px", fontFamily:"'Cinzel Decorative','Cinzel',serif", letterSpacing:"3px", fontWeight:"700", textShadow:"0 0 20px #b8922a22" }}>INVENTAIRE</div>
                <div style={{ color:"#252012", fontSize:"9px", letterSpacing:"2px", fontFamily:"'Cinzel',serif", marginTop:"3px" }}>{inventory.length} RÉFÉRENCES</div>
              </div>
              <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                <button onClick={() => setViewMode(v => v==="list"?"grid":"list")}
                  title={viewMode==="list"?"Vue grille":"Vue liste"}
                  style={{ background:"none", border:"1px solid #1c1c1c", color: viewMode==="grid"?"#b8922a":"#2a2218", cursor:"pointer", padding:"7px 9px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {viewMode==="list"
                    ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  }
                </button>
                <IconBtn onClick={() => setShowModal(true)}><Ic.Plus /></IconBtn>
              </div>
            </div>
          </div>
          <div style={{ display:"flex", background:"#020202", borderBottom:"1px solid #0f0f0f" }}>
            {Object.entries(FACTIONS).map(([k,v]) => {
              const fItems = inventory.filter(i=>i.faction===k);
              const painted = fItems.filter(i=>i.paintStatus==="painted").length;
              const total   = fItems.length;
              const pct     = total ? Math.round(painted/total*100) : 0;
              return (
                <button key={k} onClick={() => setFaction(k)} style={{ flex:1, background: faction===k?`${v.bg||"#020202"}`:"none", border:"none", borderBottom:faction===k?`2px solid ${v.accent}`:"2px solid transparent", color:faction===k?v.accent:"#181410", padding:"10px 0 8px", cursor:"pointer", fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"2px", textShadow:faction===k?`0 0 10px ${v.accent}66`:"none", transition:"background 0.3s" }}>
                  <div style={{ fontSize:"16px", marginBottom:"3px" }}>{v.icon}</div>
                  {v.short}
                  {total>0 && (
                    <div style={{ margin:"5px 8px 0", height:"2px", background:"#0f0f0f", position:"relative" }}>
                      <div style={{ width:`${pct}%`, height:"100%", background: pct===100 ? "#2a7a2a" : v.accent, transition:"width 0.4s", opacity: faction===k?1:0.4 }} />
                    </div>
                  )}
                  {total>0 && (
                    <div style={{ fontSize:"7px", color: faction===k?(pct===100?"#2a7a2a":v.accent):"#252015", marginTop:"3px", letterSpacing:"1px" }}>
                      {painted}/{total}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"12px 16px" }} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
            {rawItems.length===0 && <EmptyState icon={f.icon} title="Aucune figurine" sub={`Ajoutez des ${f.label}`} />}
            {usedRoles.map(role => (
              <div key={role} style={{ marginBottom:"16px" }}>
                {/* Role header */}
                <button onClick={() => toggleRole(role)} style={{ width:"100%", background:"none", border:"none", display:"flex", alignItems:"center", gap:"10px", marginBottom:"8px", cursor:"pointer", padding:"4px 0" }}>
                  <div style={{ width:"2px", height:"12px", background:f.accent, opacity:0.6, flexShrink:0 }} />
                  <span style={{ color:"#6a5a4a", fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"4px", flex:1, textAlign:"left" }}>{role.toUpperCase()}</span>
                  <span style={{ color:"#3a3020", fontSize:"10px" }}>{grouped[role].length} — </span>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3a3020" strokeWidth="2.5"><polyline points={collapsedRoles[role]?"6 9 12 15 18 9":"18 15 12 9 6 15"}/></svg>
                </button>
                {!collapsedRoles[role] && (
                  viewMode==="grid" ? (
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px", marginBottom:"4px" }}>
                      {grouped[role].map((item, idx) => (
                        <InventoryItem key={item.id}
                          item={item} faction={faction} ptsMap={ptsMap} onSetPts={onSetPts}
                          onDelete={onDelete} onEditPhoto={setEditPhotoItem}
                          onUpdatePaint={onUpdatePaint} onUpdateQty={onUpdateQty}
                          accent={f.accent} viewMode="grid"
                          dragHandleProps={{}}
                        />
                      ))}
                    </div>
                  ) : (
                    grouped[role].map((item, idx) => (
                      <div key={item.id} data-itemid={item.id}
                        style={{ opacity: draggingId===item.id ? 0.4 : 1, outline: dragOverId===item.id ? `1px solid ${f.accent}88` : "none", transition:"opacity 0.15s", animation:`slideLeft 0.2s ${idx*25}ms ease both` }}
                        onDragOver={e => onDragOver(e, item)}
                        onDrop={e => onDrop(e, item)}
                        onTouchStart={e => onTouchStart(e, item, role)}
                      >
                        <InventoryItem
                          item={item} faction={faction} ptsMap={ptsMap} onSetPts={onSetPts}
                          onDelete={onDelete} onEditPhoto={setEditPhotoItem}
                          onUpdatePaint={onUpdatePaint} onUpdateQty={onUpdateQty}
                          accent={f.accent} viewMode="list"
                          dragHandleProps={{
                            draggable: true,
                            onDragStart: e => onDragStart(e, item, role),
                            onDragEnd,
                          }}
                        />
                      </div>
                    ))
                  )
                )}
              </div>
            ))}
          </div>
          {showModal && <ModalAddUnit faction={faction} inventory={inventory} mode="inventory" onClose={() => setShowModal(false)} onAdd={onAdd} />}
          {editPhotoItem && <ModalEditPhoto item={editPhotoItem} faction={faction} onClose={() => setEditPhotoItem(null)} onSave={photo => onUpdatePhoto(editPhotoItem.id, photo)} />}
        </div>
      );
    }


    // ══════════════════════════════════════════════════════════
    // VIEW: Stats
    // ══════════════════════════════════════════════════════════

    function StatBar({ pct, color, height=4, bg="#0a0906" }) {
      return (
        <div style={{ background:bg, height, position:"relative", flex:1 }}>
          <div style={{ width:`${Math.min(100,pct)}%`, height:"100%", background:color, transition:"width 0.6s ease" }} />
        </div>
      );
    }

    function ViewStats({ inventory, lists, ptsMap }) {
      const totalModels   = inventory.reduce((s,i) => s+i.qty, 0);
      const totalUnique   = inventory.length;
      const totalPainted  = inventory.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);
      const totalPrimed   = inventory.filter(i=>i.paintStatus==="primed").reduce((s,i)=>s+i.qty,0);
      const totalWip      = inventory.filter(i=>i.paintStatus==="wip").reduce((s,i)=>s+i.qty,0);
      const totalUnpainted= inventory.filter(i=>i.paintStatus==="unpainted"||!i.paintStatus).reduce((s,i)=>s+i.qty,0);
      const paintPct      = totalModels ? Math.round(totalPainted/totalModels*100) : 0;

      // Points investis par faction
      const factionStats = Object.entries(FACTIONS).map(([k,f]) => {
        const items = inventory.filter(i=>i.faction===k);
        const models = items.reduce((s,i)=>s+i.qty,0);
        const painted = items.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);
        const pts = items.reduce((s,i)=>{
          const manual = ptsMap[`${k}:${i.unitId}`];
          const unit = UNITS_DB[k]?.find(u=>u.id===i.unitId);
          const p = manual || (unit ? POINTS_DB[unit.name] : 0) || 0;
          return s + p * i.qty;
        }, 0);
        // Répartition par rôle
        const byRole = {};
        items.forEach(i => {
          const unit = UNITS_DB[k]?.find(u=>u.id===i.unitId);
          if (!unit) return;
          byRole[unit.role] = (byRole[unit.role]||0) + i.qty;
        });
        return { key:k, f, models, painted, pts, byRole, uniqueUnits:items.length };
      }).filter(s=>s.models>0);

      // Unités les plus présentes dans les listes
      const unitUsage = {};
      lists.forEach(list => {
        (list.entries||[]).forEach(e => {
          const key = `${list.faction}:${e.unitId}`;
          unitUsage[key] = (unitUsage[key]||{ count:0, faction:list.faction, unitId:e.unitId });
          unitUsage[key].count += 1;
        });
      });
      const topUnits = Object.values(unitUsage)
        .sort((a,b)=>b.count-a.count)
        .slice(0,5)
        .map(u => ({ ...u, unit: UNITS_DB[u.faction]?.find(un=>un.id===u.unitId), f: FACTIONS[u.faction] }))

      const totalPts = Object.entries(ptsMap).reduce((s,[k,v])=>{
        const [faction,unitId] = k.split(":");

        <div style={pageStyle} className={`bg-stats`}>

          <div style={{ background:"#030202", borderBottom:"1px solid #0f0f0f", padding:"18px 16px 14px", position:"relative", overflow:"hidden" }}>

            <div style={{ color:"#b8922a", fontSize:"8px", letterSpacing:"5px", fontFamily:"'Cinzel',serif", opacity:0.6, marginBottom:"4px" }}>ÉTAT DES FORCES</div>

                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:"12px" }}>
                  <div>
                    <div style={{ color:"#e8dfc0", fontSize:"32px", fontFamily:"'Cinzel',serif", fontWeight:"900", lineHeight:1 }}>{paintPct}<span style={{ fontSize:"16px", color:accent }}>%</span></div>
                    <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"2px", marginTop:"2px" }}>PEINT</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ color:"#e8dfc0", fontSize:"20px", fontFamily:"'Cinzel',serif", fontWeight:"700" }}>{totalModels}</div>
                    <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"2px" }}>FIGURINES</div>
                  </div>

                {/* Stacked bar */}
                <div style={{ display:"flex", height:"6px", gap:"1px", marginBottom:"10px" }}>
                  {totalPainted>0  && <div style={{ flex:totalPainted,  background:PAINT_STATUS.painted.color }} />}
                  {totalWip>0      && <div style={{ flex:totalWip,      background:PAINT_STATUS.wip.color }} />}
                  {totalPrimed>0   && <div style={{ flex:totalPrimed,   background:PAINT_STATUS.primed.color }} />}
                  {totalUnpainted>0&& <div style={{ flex:totalUnpainted,background:"#1c1a16" }} />}

                {/* Legend */}
                <div style={{ display:"flex", gap:"12px", flexWrap:"wrap" }}>

                    {key:"wip",       label:"En cours", val:totalWip},

                    {key:"unpainted", label:"Nu",       val:totalUnpainted},

                    <div key={s.key} style={{ display:"flex", alignItems:"center", gap:"5px" }}>
                      <div style={{ width:"6px", height:"6px", borderRadius:"50%", background:PAINT_STATUS[s.key].color }} />
                      <span style={{ color:"#4a3c28", fontSize:"9px" }}>{s.label} <span style={{ color:"#8a7050" }}>{s.val}</span></span>
                    </div>

                </div>
              </div>

              {/* Summary chips */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"6px" }}>
                {[
                  { label:"RÉFÉRENCES", val:totalUnique },
                  { label:"LISTES", val:lists.length },
                  { label:"PTS TOTAL", val:totalPts||"—" },
                ].map(c => (
                  <div key={c.label} style={{ background:"#0d0b0a", border:"1px solid #1a1816", padding:"10px 8px", textAlign:"center" }}>

                    <div style={{ color:"#2a2215", fontSize:"7px", letterSpacing:"2px", marginTop:"3px" }}>{c.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── PAR FACTION ────────────────── */}
            {factionStats.length>0 && (
              <div style={{ marginBottom:"20px" }}>
                <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"4px", fontFamily:"'Cinzel',serif", marginBottom:"10px" }}>PAR FACTION</div>

                  const pct = models ? Math.round(painted/models*100) : 0;
                  const topRoles = Object.entries(byRole).sort((a,b)=>b[1]-a[1]).slice(0,4);
                  return (
                    <div key={key} style={{ background:"linear-gradient(180deg,#131110 0%,#0d0b0a 100%)", border:"1px solid #1c1a18", borderLeft:`3px solid ${f.accent}`, padding:"12px 14px", marginBottom:"8px" }}>

                        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                          <span style={{ fontSize:"20px" }}>{f.icon}</span>
                          <div>
                            <div style={{ color:"#e8dfc0", fontSize:"12px", fontFamily:"'Cinzel',serif", letterSpacing:"1px" }}>{f.label}</div>
                            <div style={{ color:"#3a3020", fontSize:"9px", marginTop:"1px" }}>{uniqueUnits} unités · {models} figurines</div>
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ color: pct===100?"#2a7a2a":f.accent, fontSize:"20px", fontFamily:"'Cinzel',serif", fontWeight:"900" }}>{pct}%</div>
                          {pts>0 && <div style={{ color:"#3a3020", fontSize:"9px" }}>{pts} pts</div>}

                      </div>
                      {/* Paint bar */}
                      <div style={{ display:"flex", height:"3px", marginBottom:"10px", gap:"1px" }}>
                        {painted>0   && <div style={{ flex:painted,         background:PAINT_STATUS.painted.color }} />}

                      {/* Role breakdown */}
                      {topRoles.length>0 && (
                        <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                          {topRoles.map(([role,cnt]) => (

                              <span style={{ color:"#3a3020", fontSize:"8px", fontFamily:"'Cinzel',serif", letterSpacing:"1px" }}>{role}</span>

                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── TOP UNITÉS EN LISTE ─────────── */}
            {topUnits.length>0 && (
              <div style={{ marginBottom:"20px" }}>
                <div style={{ color:"#3a3020", fontSize:"9px", letterSpacing:"4px", fontFamily:"'Cinzel',serif", marginBottom:"10px" }}>FAVORIS EN LISTE</div>
                {topUnits.map((u,i) => (
                  <div key={i} style={{ background:"#0d0b0a", border:"1px solid #1a1816", borderLeft:`2px solid ${u.f.accent}44`, padding:"8px 12px", marginBottom:"5px", display:"flex", alignItems:"center", gap:"10px" }}>
                    <span style={{ color:"#2a2215", fontSize:"11px", fontFamily:"'Cinzel',serif", width:"16px", textAlign:"center" }}>{i+1}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ color:"#c8b890", fontSize:"12px", fontFamily:"'Cinzel',serif" }}>{u.unit.name}</div>
                      <div style={{ color:"#3a3020", fontSize:"9px", marginTop:"1px" }}>{u.f.label} · {u.unit.role}</div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:"4px" }}>
                      <div style={{ background:`${u.f.accent}22`, border:`1px solid ${u.f.accent}44`, padding:"2px 8px" }}>
                        <span style={{ color:u.f.accent, fontSize:"11px", fontFamily:"'Cinzel',serif" }}>{u.count}×</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {inventory.length===0 && (
              <div style={{ textAlign:"center", padding:"48px 0", color:"#252015" }}>
                <div style={{ fontSize:"40px", marginBottom:"12px", opacity:0.3 }}>✠</div>
                <div style={{ fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"3px" }}>AUCUNE DONNÉE</div>
                <div style={{ fontSize:"10px", marginTop:"6px", fontStyle:"italic" }}>Ajoutez des figurines à votre inventaire</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ConfirmModal({ message, onConfirm, onCancel, accent="#b8922a" }) {
      return (
        <Overlay>
          <div style={{ background:"#0a0806", border:`1px solid ${accent}44`, borderTop:`2px solid ${accent}`, padding:"24px 20px", width:"100%", maxWidth:"320px", margin:"0 16px" }}>
            <div style={{ color:"#e8dfc0", fontSize:"14px", fontFamily:"'Cinzel',serif", letterSpacing:"1px", marginBottom:"8px", textAlign:"center" }}>CONFIRMATION</div>
            <div style={{ color:"#6a5a4a", fontSize:"12px", fontFamily:"'Crimson Pro',serif", fontStyle:"italic", textAlign:"center", marginBottom:"20px", lineHeight:1.6 }}>{message}</div>
            <div style={{ display:"flex", gap:"8px" }}>
              <button onClick={onCancel}
                style={{ flex:1, padding:"12px", background:"#060402", border:"1px solid #1c1c1c", color:"#4a4028", fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"2px", cursor:"pointer", touchAction:"manipulation" }}>
                ANNULER
              </button>
              <button onClick={onConfirm}
                style={{ flex:1, padding:"12px", background:"#1a0a0a", border:`1px solid #7a1515`, color:"#c04040", fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"2px", cursor:"pointer", touchAction:"manipulation" }}>
                SUPPRIMER
              </button>
            </div>
          </div>
        </Overlay>
      );
    }

    function useConfirm() {
      const [state, setState] = useState(null); // { message, onConfirm, accent }
      const ask = (message, onConfirm, accent) => setState({ message, onConfirm, accent });
      const cancel = () => setState(null);
      const confirm = () => { state?.onConfirm(); setState(null); };
      const modal = state ? <ConfirmModal message={state.message} onConfirm={confirm} onCancel={cancel} accent={state.accent} /> : null;
      return [ask, modal];
    }
