    const manifest = {
      name: "Black Templars Codex",
      short_name: "BT Codex",
      start_url: ".",
      display: "standalone",
      background_color: "#020202",
      theme_color: "#020202",
      icons: [{
        src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%23020202'/><text x='256' y='340' font-size='320' text-anchor='middle' fill='%23b8922a' font-family='serif'>✠</text></svg>`),
        sizes: "512x512", type: "image/svg+xml", purpose: "any maskable"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #020202; overflow: hidden; }
    #root { height: 100%; }

    @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes breathe    { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:.8;transform:scale(1.01)} }
    @keyframes slideUp    { from{transform:translateY(6px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes slideLeft  { from{transform:translateX(-8px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes goldPulse  { 0%,100%{text-shadow:0 0 10px #b8922a33} 50%{text-shadow:0 0 25px #b8922a77,0 0 50px #b8922a22} }
    @keyframes splashIn   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes splashFade { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
    @keyframes crossGrow  { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes statSlide  { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    @keyframes paintPop   { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 70%{transform:scale(0.93)} 100%{transform:scale(1)} }
    @keyframes paintGlow  { 0%{opacity:0;transform:scale(0.6)} 50%{opacity:1;transform:scale(1.3)} 100%{opacity:0;transform:scale(1.8)} } to{opacity:1;transform:translateY(0)} } to{opacity:1;transform:translateX(0)} } to{opacity:1;transform:translateX(0)} }

    body {
      background: #020202 !important;
    }
    ::-webkit-scrollbar       { width: 2px; }
    ::-webkit-scrollbar-track { background: #020202; }
    ::-webkit-scrollbar-thumb { background: #b8922a33; }
    input, button { font-family: inherit; }
    input::placeholder { color: #1a1a1a; font-style: italic; font-family: 'Crimson Pro', serif; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    button { transition: opacity 0.1s, transform 0.1s; }
    button:active { opacity: 0.55; transform: scale(0.97); }
    .hcard:active  { border-color: #b8922a66 !important; }
    .card-appear   { animation: slideUp 0.25s ease both; }
    .card-stagger  { animation: slideLeft 0.22s ease both; }
    .paint-pop     { animation: paintPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
    .bg-lists     { background-color:#020202; }
    .bg-inventory { background-color:#020202; }
    .bg-stats     { background-color:#020202; }
    .bg-wishlist  { background-color:#020202; }
    .bg-codex     { background-color:#020202; }
    .vignette-wrap::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
    }
  </style>

    const APP_VERSION = (() => {

        if (isNaN(d.getTime())) return "?";
        const day   = String(d.getDate()).padStart(2,"0");
        const month = String(d.getMonth()+1).padStart(2,"0");
        const year  = String(d.getFullYear()).slice(2);
        const h     = String(d.getHours()).padStart(2,"0");
        const m     = String(d.getMinutes()).padStart(2,"0");
        return `${day}/${month}/${year} ${h}:${m}`;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open("wh40k-codex", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("appdata");
        req.onsuccess = e => resolve(e.target.result);
        req.onerror   = e => reject(e.target.error);
      });
    }
    async function loadApp() {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction("appdata", "readonly");
          const req = tx.objectStore("appdata").get("state");
          req.onsuccess = e => resolve(e.target.result || null);
          req.onerror   = () => resolve(null);
        });
      } catch { return null; }
    }
    async function saveApp(d) {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction("appdata", "readwrite");
          tx.objectStore("appdata").put(d, "state");
          tx.oncomplete = resolve;
          tx.onerror    = resolve;
        });
      } catch {}
    }

    function SplashOverlay({ inventory, lists, ptsMap, onDone }) {

        const manual = ptsMap[`${i.faction}:${i.unitId}`];
        const unit = UNITS_DB[i.faction]?.find(u=>u.id===i.unitId);
        const p = manual || (unit ? POINTS_DB[unit.name] : 0) || 0;
        return s + p * i.qty;
      }, 0);

      useEffect(() => {
        const t1 = setTimeout(() => setPhase("out"), 2600);
        const t2 = setTimeout(() => onDone(), 3200);
        return () => { clearTimeout(t1); clearTimeout(t2); };

        const p = items.filter(i=>i.paintStatus==="painted").reduce((s,i)=>s+i.qty,0);

    function App() {

      });
      const [activeView, setActiveView] = useState("lists");

        loadApp().then(saved => {
          if (saved) setAppState({ inventory:[], lists:[], ptsMap:{}, wishlist:[], paintWishlist:[], ...saved });
          setLoaded(true);
        });
      }, []);

      const persist = useCallback((s) => {
        setSaveAnim(true);
        setLastSaved(Date.now());
        saveApp(s);
        setTimeout(() => setSaveAnim(false), 800);
      }, []);

      // Human-readable "il y a X" label, refreshed every 30s
      const [, forceRender] = useState(0);

        return () => clearInterval(t);
      }, []);
      const savedLabel = (() => {
        if (!lastSaved) return null;
        const sec = Math.floor((Date.now() - lastSaved) / 1000);
        if (sec < 10)  return "à l'instant";
        if (sec < 60)  return `il y a ${sec}s`;
        const min = Math.floor(sec / 60);
        if (min < 60)  return `il y a ${min} min`;
        return `il y a ${Math.floor(min/60)}h`;
      })();
      const updateApp = useCallback((fn) => { setAppState(prev => { const next=fn(prev); persist(next); return next; }); }, [persist]);

      // Set pts for a unit (stored in ptsMap keyed by "faction:unitId")
      const handleSetPts = useCallback((unitId, faction, pts) => {
        updateApp(s => ({ ...s, ptsMap:{ ...s.ptsMap, [`${faction}:${unitId}`]: pts } }));
      }, [updateApp]);

      // ── Export / Import ──────────────────────────────────────
      const exportData = () => {
        const data = JSON.stringify(appState, null, 2);

        const a    = document.createElement("a");
        const date = new Date().toISOString().slice(0,10);
        a.href = url; a.download = `black-templars-${date}.json`;
        a.click(); URL.revokeObjectURL(url);
      };
      const importData = (file) => {
        const reader = new FileReader();

            const parsed = JSON.parse(e.target.result);
            if (!parsed.inventory || !parsed.lists) { alert("Fichier invalide — inventory ou lists manquants."); return; }
            // Utiliser confirm React au lieu de window.confirm (bloqué en PWA)
            confirm(
              `Importer ${parsed.inventory.length} figurines et ${parsed.lists.length} listes ? Cela remplacera les données actuelles.`,
              () => {
                const next = {
                  inventory: [],
                  lists: [],
                  ptsMap: {},
                  wishlist: [],
                  paintWishlist: [],
                  ...parsed,
                  wishlist: parsed.wishlist || [],
                  paintWishlist: parsed.paintWishlist || [],

        reader.readAsText(file);

      const createList    = m  => updateApp(s => ({ ...s, lists:[...s.lists,{id:Date.now(),...m,entries:[]}] }));

      const ptsMap = appState.ptsMap || {};
      const activeList = appState.lists.find(l=>l.id===activeListId);

      return (

          {!splashDone && <SplashOverlay inventory={appState.inventory} lists={appState.lists} ptsMap={ptsMap} onDone={() => {
            try {

          )}

          <div style={{ flex:1, overflowY:"auto", paddingBottom:"64px" }}>
            {activeView==="lists" && !activeList && <ViewLists lists={appState.lists} inventory={appState.inventory} ptsMap={ptsMap} onSelect={setActiveListId} onCreate={createList} onDelete={deleteList} />}
            {activeView==="lists" && activeList && <ViewListDetail list={activeList} inventory={appState.inventory} ptsMap={ptsMap} onSetPts={handleSetPts} onBack={() => setActiveListId(null)} onAddEntry={addEntry} onDeleteEntry={id => deleteEntry(activeListId,id)} onToggleWarlord={id => toggleWarlord(activeListId,id)} onRename={name => renameList(activeListId,name)} onSetMaxPts={pts => setListMaxPts(activeListId,pts)} />}
            {activeView==="inventory" && <ViewInventory inventory={appState.inventory} ptsMap={ptsMap} onSetPts={handleSetPts} onAdd={addInventory} onDelete={deleteInventory} onUpdatePhoto={updatePhoto} onUpdatePaint={updatePaint} onUpdateQty={updateQty} onReorder={reorderInventory} />}
            {activeView==="stats"    && <ViewStats inventory={appState.inventory} lists={appState.lists} ptsMap={ptsMap} wishlist={appState.wishlist||[]} />}
            {activeView==="wishlist" && <ViewWishlist wishlist={appState.wishlist||[]} paintWishlist={appState.paintWishlist||[]} ptsMap={ptsMap} onAdd={addWish} onDelete={deleteWish} onSetStatus={setWishStatus} onSetPrice={setWishPrice} onAddPaint={addPaintWish} onDeletePaint={deletePaintWish} />}
            {activeView==="codex"    && <ViewCodex onExport={exportData} onImport={importData} inventory={appState.inventory} lists={appState.lists} />}
          </div>

          {!activeList && (
            <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:"430px", zIndex:50, background:"#030202", borderTop:"1px solid #0f0f0f", display:"flex" }}>
              <div style={{ position:"absolute", top:0, left:"15%", right:"15%", height:"1px", background:"linear-gradient(90deg,transparent,#b8922a44,transparent)" }} />
              <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#131313", fontSize:"14px" }}>✠</div>
              <div style={{ position:"absolute", top:"3px", right:"6px", color:"#1a1610", fontSize:"7px", fontFamily:"monospace", letterSpacing:"0.5px", pointerEvents:"none" }}>{APP_VERSION}</div>
              {[
                { key:"lists",     symbol:"✠", label:"CROISADE" },
                { key:"inventory", symbol:"⚜", label:"RELIQUES" },
                { key:"wishlist",  symbol:"✦", label:"WISHLIST" },
                { key:"stats",     symbol:"◈", label:"STATS"    },
                { key:"codex",     symbol:"⚙", label:"CODEX"    },
              ].map(t => (
                <button key={t.key} onClick={() => navigateTo(t.key)} style={{ flex:1, background:"none", border:"none", borderTop:activeView===t.key?"2px solid #b8922a":"2px solid transparent", padding:"13px 0 12px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:"5px" }}>
                  <span style={{ fontSize:"17px", lineHeight:1, color:activeView===t.key?"#b8922a":"#1c1a18", textShadow:activeView===t.key?"0 0 16px #b8922a99":"none" }}>{t.symbol}</span>
                  <span style={{ fontSize:"7px", fontFamily:"'Cinzel',serif", letterSpacing:"3px", color:activeView===t.key?"#b8922a":"#1c1a18" }}>{t.label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) return (
          <div style={{ background:"#020202", height:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px", fontFamily:"'Cinzel',serif", gap:"16px" }}>
            <div style={{ fontSize:"40px", color:"#7a1515" }}>⚠</div>
            <div style={{ color:"#e8dfc0", fontSize:"14px", letterSpacing:"2px", textAlign:"center" }}>ERREUR — RECHARGER LA PAGE</div>
            <div style={{ color:"#3a3020", fontSize:"10px", fontFamily:"monospace", textAlign:"center", maxWidth:"300px", lineHeight:1.6 }}>{this.state.error.message}</div>
            <button onClick={() => window.location.reload()} style={{ background:"#0f0c08", border:"1px solid #b8922a55", color:"#b8922a", padding:"10px 24px", fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"3px", cursor:"pointer", marginTop:"8px" }}>RECHARGER</button>
          </div>
        );
        return this.props.children;
      }

  </script>
</body>
</html>
